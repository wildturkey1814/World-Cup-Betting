<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Premium Analytics Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #050814;
            --bg-dashboard: rgba(13, 22, 41, 0.75);
            --bg-header: #0f192e;
            --border-neon: rgba(0, 210, 255, 0.2);
            --border-grid: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-gold: #F39C12;
            --text-neon: #00D2FF;
            --text-muted: #8A99AD;
            --color-favorite: #1E8449;
            --color-draw: #21618C;
            --color-underdog: #D35400;
        }

        body { 
            font-family: 'Rajdhani', sans-serif; 
            background-color: var(--bg-body); 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 10% 20%, rgba(30, 132, 73, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(30, 132, 73, 0.08) 0%, transparent 50%),
                linear-gradient(to bottom, #050814 0%, #0c1527 100%);
            background-attachment: fixed;
            color: var(--text-main); 
            margin: 0; 
            padding: 30px 15px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .dashboard-container { 
            max-width: 1250px; 
            margin: 0 auto; 
            background-color: var(--bg-dashboard);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-neon);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .header-banner {
            background-color: var(--bg-header);
            background-image: linear-gradient(90deg, #090f1d 0%, #0f192e 50%, #090f1d 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-grid);
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            margin: 0 0 8px 0; 
            font-size: 24px; 
            font-weight: 900;
            letter-spacing: 1.5px; 
            color: #FFFFFF;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        
        .meta-header { 
            font-family: 'Orbitron', sans-serif;
            font-size: 11px; 
            color: var(--text-neon); 
            font-weight: 700; 
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Controller Routing Panel */
        .control-panel {
            background-color: rgba(6, 12, 26, 0.8);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #00D2FF;
        }

        .control-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--text-gold);
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stage-dropdown {
            font-family: 'Orbitron', sans-serif;
            background-color: #0f192e;
            color: #FFFFFF;
            border: 1px solid var(--text-neon);
            padding: 6px 32px 6px 12px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%2300D2FF' d='M0 0l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        .stage-dropdown:focus {
            border-color: var(--text-gold);
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.4);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        
        thead th { 
            font-family: 'Orbitron', sans-serif;
            background-color: rgba(4, 8, 18, 0.9); 
            padding: 15px; 
            border-bottom: 2px solid var(--border-grid); 
            font-size: 11px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .match-card { 
            border-bottom: 1px solid var(--border-grid); 
            transition: background-color 0.2s ease;
        }
        
        .match-card:hover {
            background-color: rgba(255,255,255,0.01);
        }

        .col-matchup { 
            padding: 24px 20px; 
            vertical-align: middle; 
            width: 36%; 
            background-color: rgba(10, 17, 33, 0.4);
            border-right: 1px solid var(--border-grid);
        }
        
        .match-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-line {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flag-icon {
            display: flex;
            align-items: center;
            width: 26px;
            height: 18px;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        
        .flag-icon svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .team-name { 
            font-size: 19px; 
            font-weight: 700; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
        }
        
        .team-role {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: auto;
            letter-spacing: 0.5px;
        }
        .team-role.fav { background-color: rgba(46, 204, 113, 0.15); color: var(--color-favorite); border: 1px solid rgba(46, 204, 113, 0.3); }
        .team-role.und { background-color: rgba(230, 126, 34, 0.15); color: var(--color-underdog); border: 1px solid rgba(230, 126, 34, 0.3); }
        
        .match-meta { 
            font-size: 12px; 
            color: var(--text-muted); 
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 8px;
        }

        .col-data-layers { 
            padding: 0; 
            width: 64%; 
        }
        
        .layer-row { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 1fr 1fr; 
            align-items: center; 
            border-bottom: 1px solid var(--border-grid); 
            padding: 14px 20px; 
        }
        .layer-row:last-child { 
            border-bottom: none; 
        }
        
        .col-source { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-main);
            letter-spacing: 0.3px;
        }
        
        .pct-cell { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            height: 38px
