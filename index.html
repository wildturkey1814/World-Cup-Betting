<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Prediction Tracker</title>
<style>
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1c2030;--surface3:#212638;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --text-hi:#f0f4ff;--text-mid:#c8d0dc;--text-lo:#5a6478;
  --gold:#e8a020;--gold-hi:#f0b429;--neon:#38bdf8;
  --green:#3cac3b;--red:#e61d25;--amber:#f59e0b;--purple:#a78bfa;--blue:#60a5fa;
  --signal-back:#3cac3b;--signal-draw:#f59e0b;--signal-upset:#e61d25;
  --signal-value:#a78bfa;--signal-lean:#38bdf8;
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,"SF Pro Display","Segoe UI",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text-hi);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
button:focus-visible{outline:2px solid var(--neon);outline-offset:2px;}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0a0c10 0%,#0f1520 50%,#1a1208 100%);
  padding:28px 20px 24px;min-height:160px;
  display:flex;align-items:center;
}
.hero::before{
  content:'';position:absolute;top:0;right:0;width:60%;height:100%;
  background:radial-gradient(ellipse at 80% 50%,rgba(232,160,32,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.hero-text{position:relative;z-index:2;flex:1;}
.hero-eyebrow{
  font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'⚡';}
.hero-title{
  font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1;
  color:var(--gold);letter-spacing:-1px;margin-bottom:4px;
}
.hero-subtitle{font-size:clamp(18px,4vw,28px);font-weight:900;color:var(--text-hi);letter-spacing:-0.5px;margin-bottom:10px;}
.hero-meta{font-size:11px;color:var(--text-mid);opacity:0.8;}
.hero-updated{font-size:10px;color:var(--gold);margin-top:4px;opacity:0.7;}
.hero-img{
  position:absolute;right:0;top:0;width:45%;height:100%;
  pointer-events:none;z-index:1;overflow:hidden;
}
.hero-img img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  -webkit-mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  mix-blend-mode:luminosity;opacity:0.55;
}
@media(max-width:480px){.hero-img{width:38%;}}

/* ── SHELL ── */
.shell{max-width:820px;margin:0 auto;padding:12px 10px 40px;}
@media(min-width:700px){.shell{max-width:1140px;}}

/* ── CONTROLS ── */
.controls{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);padding:6px 10px;
  margin-bottom:6px;display:flex;flex-direction:column;gap:3px;
  position:sticky;top:0;z-index:100;
}
.controls-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.controls-row.compact{gap:3px;}
.state-filter-row{align-items:center;justify-content:space-between;gap:8px;}
.lang-group{display:flex;gap:4px;margin-left:auto;}
.tournament-summary-section{margin-bottom:8px;}
.tournament-summary-wrap{width:100%;max-width:680px;margin:0 auto;}
.snap-card{
  position:relative;overflow:hidden;width:100%;
  background:linear-gradient(135deg,#0a0c10 0%,#0f1520 52%,#1a1208 100%);
  border:1px solid rgba(232,160,32,0.32);border-radius:var(--radius);
  padding:10px 12px 9px;
  box-shadow:0 6px 22px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.04);
}
.snap-card::before{
  content:'';position:absolute;top:0;right:0;width:42%;height:100%;
  background:radial-gradient(ellipse at 88% 42%,rgba(232,160,32,0.14) 0%,transparent 68%);
  pointer-events:none;
}
.snap-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,160,32,0.4),transparent);
  pointer-events:none;
}
.snap-header{position:relative;z-index:1;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(232,160,32,0.16);}
.snap-eyebrow{font-size:8px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.snap-eyebrow::before{content:'⚡';}
.snap-title{font-size:clamp(14px,2.5vw,17px);font-weight:900;letter-spacing:0.8px;color:var(--text-hi);line-height:1.1;}
.snap-grid{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,0.95fr) auto minmax(0,1.05fr);gap:0 12px;align-items:start;}
.snap-col{padding:0;}
.snap-col-label{
  font-size:9px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;opacity:0.92;
}
.snap-stat{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.snap-stat:last-child{border-bottom:none;}
.snap-stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,0.58);letter-spacing:0.2px;line-height:1.25;flex:1;min-width:0;}
.snap-stat-val{font-size:12px;font-weight:800;color:var(--text-hi);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
.snap-stat-val.gold{color:var(--gold);}
.snap-divider{width:1px;align-self:stretch;background:linear-gradient(180deg,transparent,rgba(232,160,32,0.32),transparent);margin:0 1px;}
.snap-bullets{list-style:none;margin:0;padding:0;}
.snap-bullets li{
  position:relative;padding:0 0 0 11px;margin:0 0 5px;
  font-size:10.5px;line-height:1.35;color:rgba(255,255,255,0.78);
}
.snap-bullets li:last-child{margin-bottom:0;}
.snap-bullets li::before{
  content:'';position:absolute;left:0;top:0.55em;width:4px;height:4px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 4px rgba(232,160,32,0.5);
}
@media(max-width:580px){
  .snap-grid{grid-template-columns:1fr;gap:10px;}
  .snap-divider{display:none;}
  .snap-col+.snap-col{padding-top:8px;border-top:1px solid rgba(232,160,32,0.14);}
}
.controls-label{font-size:8px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-mid);min-width:42px;}
.btn{
  font-size:10px;font-weight:700;padding:4px 11px;
  border-radius:20px;border:1px solid var(--border-hi);
  color:var(--text-mid);background:rgba(255,255,255,0.03);
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{color:var(--text-hi);border-color:rgba(255,255,255,0.25);}
.btn.active{color:var(--gold);border-color:var(--gold);background:rgba(232,160,32,0.08);}

/* Completed view: force-hide upcoming chrome even if JS hiccups (keep live when a match is on) */
body[data-match-state="completed"] #signal-legend-box,
body[data-match-state="completed"] #tournament-summary-section{display:none!important;}
body[data-match-state="completed"]:not(.has-live) #live-section{display:none!important;}
.btn.lang-active{border-color:var(--neon);color:var(--neon);background:rgba(56,189,248,0.08);}
.stage-tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px;flex:1;min-width:0;}
.stage-tabs::-webkit-scrollbar{display:none;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{
  width:100%;padding:10px 36px 10px 14px;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--radius-sm);color:var(--text-hi);
  font-family:var(--font);font-size:13px;font-weight:500;
  outline:none;transition:border-color 0.15s;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--text-lo);}
.search-input:focus{border-color:var(--gold);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-lo);font-size:16px;cursor:pointer;display:none;padding:2px 4px;}
.search-clear.visible{display:block;}

/* ── SIGNAL LEGEND ── */
.signal-legend{
  display:flex;flex-wrap:wrap;gap:10px;padding:8px 4px 12px;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-mid);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:center;gap:10px;padding:14px 0 8px;}
.section-head-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.section-head-line{flex:1;height:1px;background:var(--border);}
.section-head-count{font-size:10px;font-weight:700;color:var(--text-lo);}

/* ── VIEW PANELS ── */
.view-panel{display:none;}.view-panel.active{display:block;}

/* ── LIVE NOW BANNER ── */
.live-now-banner{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;margin-bottom:6px;
  background:rgba(230,29,37,0.12);border:1px solid rgba(230,29,37,0.3);
  border-radius:var(--radius-sm);
  font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);
}
.live-pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse-dot 1.2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
@media(prefers-reduced-motion:reduce){.live-pulse{animation:none;}}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;position:relative;isolation:isolate;
  box-shadow:inset 3px 0 0 var(--signal-back);
  transition:box-shadow 0.2s,transform 0.15s;
}
.match-card:hover{transform:translateY(-1px);}
.match-card[data-signal="draw"]{box-shadow:inset 3px 0 0 var(--signal-draw);}
.match-card[data-signal="upset"]{box-shadow:inset 3px 0 0 var(--signal-upset);}
.match-card[data-signal="value"]{box-shadow:inset 3px 0 0 var(--signal-value);}
.match-card[data-signal="lean"]{box-shadow:inset 3px 0 0 var(--signal-lean);}
.match-card[data-signal="back"]{box-shadow:inset 3px 0 0 var(--signal-back);}
.match-card[data-signal="done"]{box-shadow:inset 3px 0 0 var(--text-lo);}
.match-card[data-signal="live"]{box-shadow:inset 3px 0 0 var(--red),0 0 20px rgba(230,29,37,0.15);}

/* ── PLAYER IMAGE ── */
.player-img-wrap{position:absolute;top:0;right:0;width:48%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.player-img-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center top;display:block;
  mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.05) 12%,rgba(0,0,0,0.4) 35%,rgba(0,0,0,0.75) 58%,black 80%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.05) 12%,rgba(0,0,0,0.4) 35%,rgba(0,0,0,0.75) 58%,black 80%);
  opacity:0.40;mix-blend-mode:luminosity;transition:opacity 0.3s;
}
.match-card:hover .player-img-wrap img{opacity:0.52;}
.match-header>*,.sources-table,.live-panel,.reco-bar,.win-odds-panel{position:relative;z-index:1;}
.match-card.has-player-img{border-right:1px solid rgba(232,160,32,0.12);}
@media(max-width:400px){.player-img-wrap{display:none;}}

/* ── MATCH HEADER ── */
.match-header{
  padding:13px 14px 11px 18px;
  display:grid;grid-template-columns:1fr auto;
  gap:8px;align-items:start;border-bottom:1px solid var(--border);
}
.match-teams{display:flex;flex-direction:column;gap:6px;}
.team-row{display:flex;align-items:center;gap:8px;}
.flag{width:22px;height:15px;border-radius:2px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.5);}
.flag svg{width:100%;height:100%;display:block;}
.team-name{font-size:15px;font-weight:800;color:var(--text-hi);line-height:1;}
.team-badge{font-size:8px;font-weight:800;letter-spacing:0.5px;padding:2px 6px;border-radius:4px;margin-left:2px;}
.badge-fav{background:rgba(60,172,59,0.15);color:var(--green);border:1px solid rgba(60,172,59,0.3);}
.badge-und{background:rgba(230,29,37,0.1);color:var(--red);border:1px solid rgba(230,29,37,0.25);}
.match-meta-col{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.match-group-tag{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);background:rgba(232,160,32,0.1);
  border:1px solid rgba(232,160,32,0.2);padding:2px 7px;border-radius:4px;
}
.match-kickoff{font-size:10px;color:var(--text-mid);font-weight:600;}

/* ── LIVE CARD SPECIFICS ── */
.live-card-label{font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--red);display:inline-flex;align-items:center;gap:5px;}
.match-card[data-signal="live"] .match-header{border-bottom:1px solid var(--border);}
.match-card[data-signal="live"] .match-meta-col{gap:3px;}
.live-badge-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.live-score-big{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;line-height:1;font-variant-numeric:tabular-nums;}
.live-minute-row{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;
}
.live-panel{width:100%;padding:0 18px 10px;}
.live-telemetry-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.live-tel-cell{display:flex;flex-direction:column;gap:2px;min-width:0;}
.live-tel-cell.full{grid-column:1/-1;}
.live-tel-label{font-size:8px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-lo);}
.live-tel-value{font-size:11px;font-weight:700;color:var(--text-hi);font-variant-numeric:tabular-nums;}
.live-tilt-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06);}
.live-tilt-home{transition:width 0.45s ease;background:linear-gradient(90deg,var(--green),rgba(60,172,59,0.55));}
.live-tilt-away{flex:1;background:linear-gradient(90deg,rgba(230,29,37,0.45),var(--red));}
.live-tilt-labels{display:flex;justify-content:space-between;font-size:8px;font-weight:700;color:var(--text-mid);margin-top:1px;}
.live-prob-shift{display:flex;flex-wrap:wrap;gap:4px;font-size:9px;font-variant-numeric:tabular-nums;}
.live-prob-chip{
  padding:2px 5px;border-radius:4px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);white-space:nowrap;
}
.live-prob-hint{font-size:8px;color:var(--text-lo);margin-top:2px;line-height:1.2;}
.live-prob-up{color:var(--green);font-weight:800;}
.live-prob-down{color:var(--red);font-weight:800;}
.live-event-feed{
  max-height:72px;overflow-y:auto;padding:7px 0 2px;
  font-size:10px;
}
.live-event-feed::-webkit-scrollbar{width:4px;}
.live-event-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
.live-event-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.live-event-item:last-child{border-bottom:none;}
.live-event-item.red-card{
  background:rgba(230,29,37,0.1);margin:0 -6px;padding:5px 6px;
  border-radius:4px;border-bottom:none;color:#ffb4b4;
}
.live-event-minute{font-weight:800;color:var(--gold);min-width:30px;font-variant-numeric:tabular-nums;flex-shrink:0;}
.live-event-empty{color:var(--text-lo);font-style:italic;font-size:9px;padding:1px 0;}
.match-card[data-signal="live"]{margin-bottom:10px;}

/* ── LIVE TELEMETRY ENGINE ── */
.live-pulse-neon{
  width:7px;height:7px;border-radius:50%;background:#39ff14;
  box-shadow:0 0 6px rgba(57,255,20,0.65);
  animation:live-neon-pulse 1.4s ease-in-out infinite;flex-shrink:0;
}
@keyframes live-neon-pulse{
  0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 4px rgba(57,255,20,0.45);}
  50%{opacity:0.5;transform:scale(0.82);box-shadow:0 0 11px rgba(57,255,20,0.95);}
}
@media(prefers-reduced-motion:reduce){.live-pulse-neon{animation:none;}}
.live-phase-banner{
  font-size:8px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;
  color:var(--neon);padding:2px 7px;border:1px solid rgba(56,189,248,0.28);
  border-radius:4px;background:rgba(56,189,248,0.07);white-space:nowrap;
}

/* ── SOURCE TABLE ── */
.sources-table{width:100%;padding:0 18px;}
.sources-header{display:grid;grid-template-columns:1fr 68px 68px 68px;padding:7px 0 5px;border-bottom:1px solid var(--border);}
.sources-header span{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-lo);text-align:center;}
.sources-header span:first-child{text-align:left;}
.source-row{display:grid;grid-template-columns:1fr 68px 68px 68px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;}
.source-row:last-child{border-bottom:none;}
.source-name{font-size:11px;font-weight:600;color:var(--text-mid);}
.prob-cell{font-size:13px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--text-mid);}
.prob-cell.hi{color:var(--text-hi);}
.prob-cell.null-val{color:var(--text-lo);font-size:11px;}
.col-fav-label{color:var(--green)!important;}
.col-draw-label{color:var(--neon)!important;}
.col-und-label{color:var(--red)!important;}

.supercharger-block{
  border-top:1px solid rgba(232,160,32,0.15);
  margin-top:2px;
  padding-bottom:4px;
}
.supercharger-row{
  display:grid;grid-template-columns:1fr 68px 68px 68px;
  padding:7px 0 2px;
}
.supercharger-footnote{
  font-size:9px;line-height:1.35;color:var(--text-lo);
  font-style:italic;opacity:0.88;padding:0 0 2px;
}
.supercharger-label{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:800;letter-spacing:0.5px;
  background:linear-gradient(90deg,var(--gold),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sc-info-btn{
  width:14px;height:14px;border-radius:50%;
  border:1px solid rgba(232,160,32,0.5);background:rgba(232,160,32,0.1);
  color:var(--gold);font-size:8px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-style:italic;font-family:Georgia,serif;flex-shrink:0;
}

/* ── WIN ODDS PANEL ── */
.win-odds-panel{
  margin:0 18px 10px;padding:8px 10px;
  background:rgba(167,139,250,0.05);
  border:1px solid rgba(167,139,250,0.15);
  border-radius:var(--radius-sm);
}
.win-odds-header{
  font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--purple);margin-bottom:6px;
}
.win-odds-grid{display:flex;flex-direction:column;gap:3px;}
.win-odds-row{display:grid;grid-template-columns:1fr 80px 80px;align-items:center;gap:4px;}
.win-odds-source{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-mid);}
.win-odds-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.win-odds-val{font-size:12px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--text-mid);}
.win-odds-val.hi{color:var(--text-hi);}
.win-odds-val.null{color:var(--text-lo);font-size:11px;}

/* ── RECO BAR ── */
.reco-bar{margin:0 18px 12px;padding:10px 12px;border-radius:var(--radius-sm);margin-top:8px;}
.reco-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.reco-info-btn{
  flex-shrink:0;width:20px;height:20px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);
  color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.15s;font-style:italic;font-family:Georgia,serif;
}
.reco-info-btn:hover{border-color:var(--gold);background:rgba(232,160,32,0.12);}
.reco-title{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-hi);flex:1;}
.reco-call{font-size:15px;font-weight:800;line-height:1.2;margin-bottom:4px;}
.reco-sub{font-size:11px;font-weight:500;color:var(--text-mid);line-height:1.4;}
.reco-tooltip{display:none;position:fixed;background:#1a2030;border:1px solid var(--border-hi);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--text-mid);line-height:1.6;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.7);max-width:min(280px,85vw);pointer-events:none;}
.reco-tooltip.visible{display:block;}
.reco-tooltip-title{font-weight:700;color:var(--text-hi);font-size:12px;margin-bottom:5px;}
.reco-back{background:rgba(60,172,59,0.08);border:1px solid rgba(60,172,59,0.2);}
.reco-draw{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);}
.reco-upset{background:rgba(230,29,37,0.08);border:1px solid rgba(230,29,37,0.2);}
.reco-value{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);}
.reco-lean{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);}
.reco-back .reco-call{color:var(--green);}
.reco-draw .reco-call{color:var(--amber);}
.reco-upset .reco-call{color:var(--red);}
.reco-value .reco-call{color:var(--purple);}
.reco-lean .reco-call{color:var(--neon);}

/* ── GROUP COLLAPSIBLE ── */
.group-section{margin-bottom:6px;}
.group-header{width:100%;display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);cursor:pointer;text-align:left;transition:background 0.15s;}
.group-header:hover{background:rgba(255,255,255,0.06);}
.group-header-label{font-size:12px;font-weight:800;color:var(--text-hi);letter-spacing:0.3px;}
.group-header-meta{font-size:11px;color:var(--text-mid);flex:1;}
.group-header-chevron{font-size:10px;color:var(--text-lo);}
.group-body{padding-top:6px;}
#live-section{margin-bottom:10px;}
.completed-day-block{margin-bottom:18px;}
.completed-day-header{
  font-size:12px;font-weight:800;color:var(--gold-hi);letter-spacing:0.3px;
  padding:8px 0 10px;border-bottom:1px solid rgba(232,160,32,0.2);margin-bottom:10px;
}
.matchday-section{margin-bottom:22px;}
.matchday-header{
  font-size:13px;font-weight:800;color:var(--text-hi);letter-spacing:0.4px;
  padding:10px 0 8px;border-bottom:1px solid var(--border-hi);margin-bottom:12px;
}
.matchday-header span{color:var(--gold-hi);}
.group-stage-progress{
  font-size:11px;color:var(--text-mid);padding:8px 0 12px;line-height:1.5;
}
.win-odds-footnote{font-size:9px;line-height:1.35;color:var(--text-lo);font-style:italic;margin-top:6px;opacity:0.88;}
.empty{text-align:center;padding:40px 20px;color:var(--text-lo);font-size:13px;}

/* ── BRACKET ── */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.bracket-zone-tabs{display:flex;gap:6px;padding:12px 0 10px;flex-wrap:wrap;}
.bracket-zone-simple{display:none;}
.bracket-zone-simple.active{display:block;overflow-x:auto;}
.bracket-node{margin:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:visible;position:relative;}
.bracket-node::after{content:'';position:absolute;right:-9px;top:50%;width:9px;height:1px;background:var(--border-hi);}
.bracket-node.no-connector::after{display:none;}
.bracket-team-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-mid);}
.bracket-team-row:last-of-type{border-bottom:none;}
.bracket-team-row.is-winner{color:var(--text-hi);font-weight:700;background:rgba(60,172,59,0.05);}
.bracket-team-row.is-eliminated{opacity:0.4;}
.bracket-team-row .flag{width:16px;height:11px;flex-shrink:0;}
.bracket-team-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bracket-pct{font-size:11px;font-weight:700;color:var(--neon);font-variant-numeric:tabular-nums;white-space:nowrap;}
.bracket-pct.fav{color:var(--green);}.bracket-pct.und{color:var(--text-lo);}
.bracket-draw-tag{text-align:center;font-size:9px;font-weight:700;color:var(--neon);padding:2px 0;background:rgba(56,189,248,0.05);border-top:1px solid var(--border);}
.bracket-tbd-node{margin:8px;padding:10px 8px;border:1px dashed rgba(255,255,255,0.1);border-radius:var(--radius-sm);font-size:11px;color:var(--text-lo);text-align:center;font-style:italic;}
.zone-bracket-grid{display:flex;gap:0;min-width:600px;padding:12px 0;}
.zone-round-col{width:190px;flex-shrink:0;display:flex;flex-direction:column;}
.zone-round-header{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);padding:0 8px 10px;border-bottom:1px solid var(--border);margin-bottom:4px;text-align:center;}

/* ── STATUS / SPINNER ── */
.status-pane{padding:60px 20px;text-align:center;color:var(--text-mid);font-size:14px;}
.status-pane.error{color:var(--red);}
.spinner{width:24px;height:24px;border:2px solid rgba(232,160,32,0.2);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.spinner{animation:none;}}

/* ── FLIP CARD GLOBAL WRAPPERS ── */
.flip-card{perspective:1200px; -webkit-perspective:1200px; cursor:pointer;}
.flip-card-inner{position:relative; transform-style:preserve-3d; -webkit-transform-style:preserve-3d; transition:transform 0.6s cubic-bezier(0.4,0.2,0.2,1); width:100%; height:100%;}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
.flip-face{backface-visibility:hidden; -webkit-backface-visibility:hidden;}
.pc-scorer-sheet{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);font-size:10px;line-height:1.55;}
.pc-scorer-col{display:flex;flex-direction:column;gap:2px;color:var(--text-mid);}
.pc-scorer-col.home{text-align:left;}
.pc-scorer-col.away{text-align:right;}
.pc-scorer-line{font-weight:600;color:var(--text-hi);}
.pc-scorer-line .pc-scorer-min{color:var(--text-lo);font-weight:700;margin-right:4px;}
.pc-scorer-line .pc-scorer-min.right{margin-right:0;margin-left:4px;}
.pc-moments-list{display:flex;flex-direction:column;gap:5px;}
.pc-moment-row{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:6px;font-size:10px;padding:4px 6px;border-radius:4px;background:rgba(255,255,255,0.02);}
.pc-moment-row.home{border-left:2px solid var(--neon);}
.pc-moment-row.away{border-left:2px solid rgba(248,113,113,0.75);}
.pc-moment-min{font-weight:800;color:var(--text-lo);font-variant-numeric:tabular-nums;}
.pc-moment-name{font-weight:700;color:var(--text-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-moment-team{font-weight:600;color:var(--text-lo);font-size:9px;}
.pc-moment-score{font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;font-size:11px;}
.pc-potm-box{background:rgba(232,160,32,0.02);border:1px solid rgba(232,160,32,0.08);padding:8px 6px;border-radius:6px;text-align:center;}
.pc-potm-name{font-size:11px;font-weight:800;color:#fff;margin-top:4px;line-height:1.3;}
.pc-potm-team{font-size:9px;font-weight:600;color:var(--text-lo);margin-top:2px;}
.pc-potm-note{font-size:8px;color:var(--text-lo);margin-top:4px;line-height:1.35;}

/* ── CARD GRID ── */
.sort-row{display:flex;gap:6px;align-items:center;}
.sort-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-lo);min-width:32px;}
.card-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:700px){.card-grid{grid-template-columns:1fr 1fr;}}

/* ── COMPONENT MODIFIERS ── */
.pc-container{background:#070a0f; border:1px solid rgba(255,255,255,0.08); border-radius:14px; overflow:hidden;}
.pc-front-layout{display:grid; grid-template-columns:1.2fr 1fr; gap:16px; padding:16px; background:linear-gradient(180deg, #0e121a 0%, #07090d 100%); border-bottom:2px solid var(--gold);}
@media(max-width:480px){
  .sources-header,.source-row,.supercharger-row{grid-template-columns:1fr 60px 60px 60px;}
  .prob-cell{font-size:12px;}.team-name{font-size:14px;}
}

function normTeamName(s){const k=String(s||'').trim().toLowerCase();return TEAM_NORM[k]||k;}
function parseMinuteNum(raw){
  if(raw==null||raw==='')return null;
  const m=String(raw).match(/(\d+)/);
  return m?+m[1]:null;
}
function fmtMinuteTick(raw){
  if(!raw)return'';
  const s=String(raw).trim();
  if(/['']/.test(s))return s;
  const n=parseMinuteNum(s);
  return n!=null?`${n}'`:s;
}
function isLiveWindow(match){
  if(!match.kickoff)return false;
  const ko=new Date(match.kickoff).getTime(),now=Date.now();
  return now>=ko-5*60*1000&&now<=ko+150*60*1000;
}
function isEspnLiveStatus(statusName){
  return /IN_PROGRESS|HALFTIME|FIRST_HALF|SECOND_HALF|STATUS_LIVE|STARTED|DELAYED/i.test(String(statusName||''));
}
function isActiveLive(m){
  if(!m||m.type==='COMPLETED')return false;
  if(m.espnLiveActive||m.type==='IN_PLAY')return true;
  if(m.liveFinal)return false;
  return m.type==='UPCOMING'&&isLiveWindow(m);
}

  return [...seen.values()]

    .filter(matchesSearch)

}
function applyEspnLiveFlags(events){
  let changed=false;
  for(const m of allMatches){
    if(m.type==='COMPLETED')continue;
    const ev=findEspnEvent(events||[],m);
    if(!ev){
      if(m.espnLiveActive){m.espnLiveActive=false;changed=true;}
      continue;
    }
    const st=ev.competitions?.[0]?.status?.type?.name||'';
    if(isEspnLiveStatus(st)){
      if(!m.espnLiveActive||m.liveFinal){
        m.espnLiveActive=true;
        m.liveFinal=false;
        changed=true;
      }
    }else if(st==='STATUS_FINAL'){
      if(m.espnLiveActive||!m.liveFinal){
        m.espnLiveActive=false;
        m.liveFinal=true;
        changed=true;
      }
    }else if(m.espnLiveActive){
      m.espnLiveActive=false;
      changed=true;
    }
  }
  return changed;
}

function parseLivePhase(statusObj,statusType){
  const detail=String(statusType?.detail||statusType?.shortDetail||'').toUpperCase();
  const name=String(statusType?.name||'').toUpperCase();
  const period=statusObj?.period||1;
  if(/HALF|HT/.test(detail)||name.includes('HALFTIME'))return'HALFTIME';
  if(period>=2||/2ND|SECOND/.test(detail))return'SECOND HALF';
  return'FIRST HALF';
}
function livePhaseLabel(phase){
  const d=DICT[lang];
  if(phase==='HALFTIME')return d.livePhaseHalf||'HALFTIME';
  if(phase==='SECOND HALF')return d.livePhaseSecond||'SECOND HALF';
  return d.livePhaseFirst||'FIRST HALF';
}
function resolveLiveMetrics(match){
  const m=match.liveMetrics||match.metrics||{};
  const adv=match.advancedMetrics||{};
  let xg=m.xg||adv.xg||null;
  let tilt=m.fieldTiltRoll10||m.fieldTilt||adv.fieldTilt||null;
  if(!tilt&&match.boxScore?.possession){
    const hp=+match.boxScore.possession.home;
    if(!isNaN(hp))tilt={home:hp,away:Math.max(0,100-hp)};
  }
  return{xg,tilt};
}
function layerHomeDrawAway(match){
  const layers=match.layers||[];if(!layers.length)return null;
  function p(s){return(!s||s==='--')?null:parseFloat(s);}
  const favIsHome=match.favTeam===match.home;
  let hv=[],dv=[],av=[];
  layers.forEach(l=>{
    const hp=favIsHome?p(l.fav):p(l.und),ap=favIsHome?p(l.und):p(l.fav),dp=p(l.draw);
    if(hp!=null)hv.push(hp);if(dp!=null)dv.push(dp);if(ap!=null)av.push(ap);
  });
  if(!hv.length)return null;
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
  return{home:avg(hv),draw:avg(dv),away:avg(av)};
}
function shiftLiveProbs(base,hg,ag,minuteRaw){
  if(!base)return null;
  const minute=parseMinuteNum(minuteRaw)||45;
  const elapsed=Math.min(90,Math.max(0,minute))/90;
  const lead=hg-ag;
  let{home,draw,away}=base;
  if(lead===0)return{...base,dHome:0,dDraw:0,dAway:0};
  const boost=Math.min(0.38,Math.abs(lead)*0.11+elapsed*0.22);
  if(lead>0){
    home=Math.min(96,home+boost*100);
    draw=Math.max(2,draw-boost*38);
    away=Math.max(2,away-boost*62);
  }else{
    away=Math.min(96,away+boost*100);
    draw=Math.max(2,draw-boost*38);
    home=Math.max(2,home-boost*62);
  }
  const sum=home+draw+away;
  home=home/sum*100;draw=draw/sum*100;away=away/sum*100;
  return{
    home,draw,away,
    dHome:Math.round((home-base.home)*10)/10,
    dDraw:Math.round((draw-base.draw)*10)/10,
    dAway:Math.round((away-base.away)*10)/10,
  };
}
function parseEspnStat(team,names){
  const stats=team?.statistics||[];
  for(const n of names){
    const s=stats.find(x=>{
      const nm=String(x.name||'').toLowerCase(),lb=String(x.label||'').toLowerCase();
      return nm===n.toLowerCase()||lb.includes(n.toLowerCase());
    });
    if(s!=null){
      const v=s.displayValue??s.value;
      if(v!=null&&v!=='')return v;
    }
  }
  return null;
}
function parsePct(v){
  if(v==null)return null;
  const n=parseFloat(String(v).replace('%',''));
  return isNaN(n)?null:n;
}
function estimateXgFromStats(hSOT,aSOT,hg,ag){
  const hx=(hSOT!=null?+hSOT*0.34:0)+(hg||0)*0.12+0.25;
  const ax=(aSOT!=null?+aSOT*0.34:0)+(ag||0)*0.12+0.25;
  return{home:+Math.max(hg*0.35,hx).toFixed(2),away:+Math.max(ag*0.35,ax).toFixed(2)};
}
function eventSideFromEspn(ev,match,homeId){
  const ath=ev.participants?.[0]?.athlete;
  const teamId=ath?.teamId||ev.team?.id;
  if(teamId&&homeId)return String(teamId)===String(homeId)?'home':'away';
  const txt=String(ev.text||ath?.displayName||'').toLowerCase();
  if(txt.includes(normTeamName(match.home).split(' ')[0]))return'home';
  if(txt.includes(normTeamName(match.away).split(' ')[0]))return'away';
  return'home';
}
function extractEspnEvents(data,match,homeId){
  const out=[],seen=new Set();
  const push=(type,minute,text,team)=>{
    const key=`${type}|${minute}|${text}`;
    if(seen.has(key))return;
    seen.add(key);
    out.push({type,minute:parseMinuteNum(minute)||0,text,team});
  };
  const ingest=(list)=>{
    (list||[]).forEach(ev=>{
      const txt=String(ev.type?.text||ev.type?.type||'').toLowerCase();
      const min=ev.clock?.displayValue||ev.time?.displayValue||ev.period?.displayValue||'';
      const player=ev.participants?.[0]?.athlete?.displayName||ev.text||'';
      const side=eventSideFromEspn(ev,match,homeId);
      if(txt.includes('goal')){
        if(txt.includes('own goal'))push('goal',min,player+' (OG)',side);
        else push('goal',min,player,side);
      }
      if(txt.includes('red card')||txt.includes('redcard')||(txt.includes('red')&&txt.includes('card')))
        push('red',min,player||'Red card',side);
    });
  };
  ingest(data.keyEvents);
  ingest(data.plays);
  return out.sort((a,b)=>a.minute-b.minute);
}
function parseEspnSummary(data,match){
  const teams=(data.boxscore||{}).teams||[];
  const homeTeam=teams.find(t=>normTeamName(t.team?.displayName)===normTeamName(match.home));
  const awayTeam=teams.find(t=>normTeamName(t.team?.displayName)===normTeamName(match.away));
  const homeId=homeTeam?.team?.id;
  const hPos=parsePct(parseEspnStat(homeTeam,['possessionPct','possession','ballPossession']));
  const aPos=parsePct(parseEspnStat(awayTeam,['possessionPct','possession','ballPossession']));
  const hSOT=parseEspnStat(homeTeam,['shotsOnTarget','shotsOnGoal']);
  const aSOT=parseEspnStat(awayTeam,['shotsOnTarget','shotsOnGoal']);
  const hXG=parseEspnStat(homeTeam,['expectedGoals','expectedgoals','xg']);
  const aXG=parseEspnStat(awayTeam,['expectedGoals','expectedgoals','xg']);
  const comp=(data.header?.competitions||[])[0]||{};
  const statusObj=comp.status||{};
  const statusType=statusObj.type||{};
  const homeComp=comp.competitors?.find(c=>c.homeAway==='home');
  const awayComp=comp.competitors?.find(c=>c.homeAway==='away');
  const hg=parseInt(homeComp?.score??homeComp?.linescore??0,10)||0;
  const ag=parseInt(awayComp?.score??awayComp?.linescore??0,10)||0;
  let xg=null;
  if(hXG!=null&&aXG!=null)xg={home:+parseFloat(hXG).toFixed(2),away:+parseFloat(aXG).toFixed(2)};
  else xg=estimateXgFromStats(hSOT,aSOT,hg,ag);
  let tilt=null;
  if(hPos!=null)tilt={home:hPos,away:aPos!=null?aPos:Math.max(0,100-hPos)};
  return{
    homeScore:hg,awayScore:ag,
    score:`${hg} - ${ag}`,
    minute:statusObj.displayClock||'',
    phase:parseLivePhase(statusObj,statusType),
    metrics:{xg,fieldTilt:tilt},
    events:extractEspnEvents(data,match,homeId),
  };
}

  if(!c)return match;
  return{
    ...match,
    liveScore:c.score??match.liveScore,

    homeScore:c.homeScore??match.homeScore,
    awayScore:c.awayScore??match.awayScore,
    liveMetrics:c.metrics||match.liveMetrics,
    liveEvents:c.events||match.liveEvents,
  };
}
function findEspnEvent(events,match){
  const h0=normTeamName(match.home),a0=normTeamName(match.away);
  return(events||[]).find(ev=>{
    const comp=ev.competitions?.[0];if(!comp)return false;
    const comps=comp.competitors||[];
    const hn=normTeamName(comps.find(c=>c.homeAway==='home')?.team?.displayName||'');
    const an=normTeamName(comps.find(c=>c.homeAway==='away')?.team?.displayName||'');
    return(hn===h0&&an===a0)||(hn===a0&&an===h0);
  });
}

function roundProbsTo100(h,d,a){
  const vals=[h,d,a];
  const floored=vals.map(v=>Math.floor(v));
  let remainder=100-floored.reduce((s,v)=>s+v,0);
  const order=vals.map((v,i)=>({i,frac:v-floored[i]})).sort((x,y)=>y.frac-x.frac);
  const out=[...floored];
  for(let r=0;r<remainder;r++)out[order[r].i]++;
  return{home:out[0],draw:out[1],away:out[2]};
}
function buildLiveProbHtml(match,hg,ag,minute){
  const base=layerHomeDrawAway(match);
  if(!base)return'<span class="live-event-empty">—</span>';
  const live=shiftLiveProbs(base,hg,ag,minute);
  const norm=roundProbsTo100(live.home,live.draw,live.away);
  const d=DICT[lang];
  const chip=(lbl,val,delta)=>{
    const cls=delta>0.5?'live-prob-up':delta<-0.5?'live-prob-down':'';
    const sign=delta>0?'+':'';
    const dTxt=Math.abs(delta)>=0.5?` <span class="${cls}">(${sign}${delta.toFixed(1)})</span>`:'';
    return`<span class="live-prob-chip">${esc(lbl)} ${val}%${dTxt}</span>`;
  };
  return chip(d.liveProbHome||'H',norm.home,live.dHome)+chip(d.liveProbDraw||'D',norm.draw,live.dDraw)+chip(d.liveProbAway||'A',norm.away,live.dAway);
}
function buildLiveEventsHtml(match,events){
  const d=DICT[lang];
  const home=tn(match.home),away=tn(match.away);
  const list=events&&events.length?events:(match.boxScore?.goals||[]).map(g=>({
    type:'goal',minute:g.minute||0,text:g.scorer||'',team:g.team,
  }));
  const reds=[];
  const bs=match.boxScore;
  if(bs?.redCards){
    if(bs.redCards.home>0)reds.push({type:'red',minute:'',text:home,team:'home'});
    if(bs.redCards.away>0)reds.push({type:'red',minute:'',text:away,team:'away'});
  }
  const merged=[...list,...reds].sort((a,b)=>(a.minute||0)-(b.minute||0));
  if(!merged.length)return`<div class="live-event-empty">${esc(d.liveNoEvents)}</div>`;
  return merged.map(ev=>{
    const min=ev.minute?`${ev.minute}'`:'' ;
    const side=ev.team==='away'?away:home;
    if(ev.type==='red')
      return`<div class="live-event-item red-card"><span class="live-event-minute">${esc(min||'—')}</span><span>🟥 ${esc(ev.text||side)}</span></div>`;
    return`<div class="live-event-item"><span class="live-event-minute">${esc(min)}</span><span>⚽ ${esc(ev.text||side)}</span></div>`;
  }).join('');
}
function applyLiveTelemetry(match,payload){
  liveTelemetryCache[match.id]={...(liveTelemetryCache[match.id]||{}),...payload};
  const m=mergeLiveDisplayState(match);
  const hg=m.homeScore??(parseInt(String(m.liveScore||'0-0').split('-')[0],10)||0);
  const ag=m.awayScore??(parseInt(String(m.liveScore||'0-0').split('-')[1],10)||0);
  updateLiveCardDOM(match.id,{
    ...payload,
    probs:true,
    probsHtml:buildLiveProbHtml(m,hg,ag,payload.minute||m.liveMinute),
    eventsHtml:buildLiveEventsHtml(m,payload.events||m.liveEvents),
  });
}
function startLivePolling(){
  Object.keys(liveTrackers).forEach(id=>{
    if(!allMatches.some(m=>m.id===id&&isActiveLive(m))){
      clearInterval(liveTrackers[id]);delete liveTrackers[id];delete liveTelemetryCache[id];
    }
  });
  allMatches.filter(m=>isActiveLive(m)).forEach(m=>{
    if(!liveTrackers[m.id]){
      liveTrackers[m.id]=setInterval(()=>pollLiveScore(m),60000);
      pollLiveScore(m);
    }
  });
}
async function pollLiveScore(match){
  try{
    const sbUrl='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
    const r=await fetch(sbUrl);if(!r.ok)return;
    const d=await r.json();
    const ev=findEspnEvent(d.events||[],match);
    if(!ev)return;
    const comp=ev.competitions?.[0]||{};
    const home=comp.competitors?.find(t=>t.homeAway==='home');
    const away=comp.competitors?.find(t=>t.homeAway==='away');
    const hg=parseInt(home?.score??0,10)||0;
    const ag=parseInt(away?.score??0,10)||0;
    const score=`${hg} - ${ag}`;
    const statusObj=comp.status||{};
    const statusType=statusObj.type||{};
    const status=statusType.name||'';
    const minute=statusObj.displayClock||'';
    const phase=parseLivePhase(statusObj,statusType);
    let payload={score,minute,phase,homeScore:hg,awayScore:ag,metrics:resolveLiveMetrics(match),events:match.liveEvents||[]};
    const espnId=ev.id||comp.id;
    if(espnId){
      try{
        const sr=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${espnId}`);
        if(sr.ok){
          const summary=await sr.json();
          const parsed=parseEspnSummary(summary,match);
          payload={...payload,...parsed,metrics:{...payload.metrics,...parsed.metrics}};
          if(parsed.events?.length)payload.events=parsed.events;
        }
      }catch(e){}
    }
    if(!payload.metrics?.xg){
      const cached=resolveLiveMetrics(match);
      if(cached.xg)payload.metrics={...payload.metrics,xg:cached.xg};
      else payload.metrics={...payload.metrics,xg:estimateXgFromStats(null,null,hg,ag)};
    }
    if(!payload.metrics?.fieldTilt){
      const cached=resolveLiveMetrics(match);
      if(cached.tilt)payload.metrics={...payload.metrics,fieldTilt:cached.tilt};
    }
    applyLiveTelemetry(match,payload);
    const idx=allMatches.findIndex(m=>m.id===match.id);
    if(idx>=0){
      allMatches[idx].liveScore=score;
      allMatches[idx].liveMinute=minute;
      allMatches[idx].livePhase=phase;
      allMatches[idx].homeScore=hg;
      allMatches[idx].awayScore=ag;
      if(payload.metrics)allMatches[idx].liveMetrics=payload.metrics;
      if(payload.events?.length)allMatches[idx].liveEvents=payload.events;
    }
    if(isEspnLiveStatus(status)){
      if(idx>=0){
        allMatches[idx].espnLiveActive=true;
        allMatches[idx].liveFinal=false;
      }
      if(!document.getElementById(`live-card-${match.id}`))renderLiveSection(stageLiveMatches(currentStage));
    }else if(status==='STATUS_FINAL'){
      clearInterval(liveTrackers[match.id]);
      delete liveTrackers[match.id];
      if(idx>=0){
        allMatches[idx].liveFinal=true;
        allMatches[idx].espnLiveActive=false;
      }
      renderLiveSection(stageLiveMatches(currentStage));
    }
  }catch(e){}
}

function calcRecoForMatch(match){
  const layers=match.layers||[];if(!layers.length)return null;
  function p(s){return(!s||s==='--')?null:parseFloat(s);}
  const favIsHome=match.favTeam===match.home;
  let fv=[],dv=[],uv=[];
  layers.forEach(l=>{const fp=favIsHome?p(l.fav):p(l.und),up=favIsHome?p(l.und):p(l.fav),dp=p(l.draw);if(fp!=null)fv.push(fp);if(dp!=null)dv.push(dp);if(up!=null)uv.push(up);});
  if(!fv.length)return null;
  const af=fv.reduce((a,b)=>a+b,0)/fv.length,ad=dv.length?dv.reduce((a,b)=>a+b,0)/dv.length:0,au=uv.length?uv.reduce((a,b)=>a+b,0)/uv.length:0;
  const nonFav=ad+au;
  const eloL=layers.find(l=>l.source.includes('ELO')),mktL=layers.find(l=>l.source.includes('Sportsbook')||l.source.includes('P2P'));
  const ef=eloL?(favIsHome?p(eloL.fav):p(eloL.und)):null,mf=mktL?(favIsHome?p(mktL.fav):p(mktL.und)):null;
  const gap=(ef!=null&&mf!=null)?Math.abs(ef-mf):0;
  const d=DICT[lang];

  if(af>nonFav){
    if(af>=65)return{type:'back',cls:'reco-back',call:d.recoBack,tipKey:'tipBack',sub:`${af.toFixed(1)}% avg — ${fv.length} sources aligned`};
    if(gap>=15&&ef!=null&&mf!=null){
      if(ef<mf)return{type:'upset',cls:'reco-upset',call:d.recoUpset,tipKey:'tipUpset',sub:`ELO: ${(100-ef).toFixed(1)}% underdog vs market ${(100-mf).toFixed(1)}% — ${gap.toFixed(1)}pt gap`};
      return{type:'value',cls:'reco-value',call:d.recoValue,tipKey:'tipValue',sub:`ELO sees ${ef.toFixed(1)}% vs market ${mf.toFixed(1)}% — ${gap.toFixed(1)}pt divergence`};
    }
    return{type:'lean',cls:'reco-lean',call:d.recoLean,tipKey:'tipLean',sub:`${af.toFixed(1)}% avg — beats draw+und (${nonFav.toFixed(1)}%)`};
  }

  if(gap>=15&&ef!=null&&mf!=null){if(ef<mf)return{type:'upset',cls:'reco-upset',call:d.recoUpset,tipKey:'tipUpset',sub:`ELO: ${(100-ef).toFixed(1)}% underdog vs market ${(100-mf).toFixed(1)}% — ${gap.toFixed(1)}pt gap`};return{type:'value',cls:'reco-value',call:d.recoValue,tipKey:'tipValue',sub:`ELO sees ${ef.toFixed(1)}% vs market ${mf.toFixed(1)}% — ${gap.toFixed(1)}pt divergence`};}
  if(ad>=30&&af<52)return{type:'draw',cls:'reco-draw',call:d.recoDraw,tipKey:'tipDraw',sub:`${ad.toFixed(1)}% avg draw — no clear favourite`};
  if(af>=50)return{type:'lean',cls:'reco-lean',call:d.recoLean,tipKey:'tipLean',sub:`${af.toFixed(1)}% avg — sources agree, slim margin`};
  return{type:'draw',cls:'reco-draw',call:d.recoDraw,tipKey:'tipDraw',sub:`${af.toFixed(1)}% vs ${au.toFixed(1)}% — too close to call`};
}
function calcReco(match){
  if(match.type==='COMPLETED'||match.type==='IN_PLAY')return null;
  return calcRecoForMatch(match);
}
function matchOutcomeSide(match){
  const hg=match.homeScore,ag=match.awayScore;
  if(hg==null||ag==null)return null;
  if(hg===ag)return 'draw';
  if(!match.favTeam)return null;
  const favIsHome=match.favTeam===match.home;
  const favWon=favIsHome?hg>ag:ag>hg;
  return favWon?'fav':'und';
}
function recoWasCorrect(match,reco){
  const side=matchOutcomeSide(match);
  if(!side||!reco)return null;
  if(reco.type==='draw')return side==='draw';
  if(reco.type==='upset')return side==='und';
  if(reco.type==='back'||reco.type==='lean'||reco.type==='value')return side==='fav';
  return null;
}
function gatherCompletedPool(){
  const seen=new Map();
  const ingest=m=>{
    if(isGhostMatch(m))return;
    if(m.homeScore==null&&m.awayScore==null&&m.type!=='COMPLETED')return;
    if(m.type&&m.type!=='COMPLETED')return;
    if(m.homeScore==null||m.awayScore==null)return;
    const k=archivePairKey(m);
    if(!seen.has(k))seen.set(k,m);
  };
  allMatches.filter(m=>m.type==='COMPLETED').forEach(ingest);
  completedArchive.forEach(ingest);
  return [...seen.values()];
}
const DRAW_POSSIBILITY_PCT=30;
function pctHit(correct,total){
  if(!total)return null;
  return Math.round((correct/total)*100);
}
function layerAvgNonFav(match){
  const layers=match.layers||[];if(!layers.length)return null;
  function p(s){return(!s||s==='--')?null:parseFloat(s);}
  const favIsHome=match.favTeam===match.home;
  let dv=[],uv=[];
  layers.forEach(l=>{
    const dp=p(l.draw),fp=favIsHome?p(l.fav):p(l.und),up=favIsHome?p(l.und):p(l.fav);
    if(dp!=null)dv.push(dp);if(up!=null)uv.push(up);else if(fp!=null&&dp!=null)uv.push(Math.max(0,100-fp-dp));
  });
  if(!dv.length)return null;
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const draw=avg(dv),und=uv.length?avg(uv):0;
  return{draw,und,combined:draw+und};
}
function suggestedDrawPossible(match){
  const reco=calcRecoForMatch(match);
  if(reco&&reco.type==='draw')return true;
  const nf=layerAvgNonFav(match);
  return nf&&nf.draw>=DRAW_POSSIBILITY_PCT;
}
function snapStat(lbl,valHtml){return`<div class="snap-stat"><span class="snap-stat-lbl">${lbl}</span>${valHtml}</div>`;}
function fmtStatTriple(count,total,pct){
  if(!total)return'<span class="snap-stat-val">—</span>';
  const p=pct!=null?pct:Math.round((count/total)*100);
  return`<span class="snap-stat-val">${count} / ${total} <span style="opacity:0.62;font-weight:600;font-size:10px">(${p}%)</span></span>`;
}
function fmtInsightText(d,item){
  const key='insight'+item.id.charAt(0).toUpperCase()+item.id.slice(1);
  let t=d[key]||DICT.en[key]||'';
  Object.entries(item.params||{}).forEach(([k,v])=>{t=t.replace(new RegExp('\\{'+k+'\\}','g'),v);});
  return t;
}
function buildWorldCupInsights(pool,s){
  const items=[];
  const find=fn=>pool.find(fn);
  const kick=m=>new Date(m.kickoff||0).getTime()||0;
  const isCuracao=a=>a==='Curacao'||a==='Curaçao';
  const porRout=find(m=>m.home==='Portugal'&&m.away==='Uzbekistan'&&+(m.homeScore||0)===5);
  if(porRout)items.push({id:'ronaldo',kick:kick(porRout),prio:100});
  const argOpener=find(m=>m.home==='Argentina'&&m.away==='Algeria'&&+(m.homeScore||0)===3);
  if(argOpener)items.push({id:'messi',kick:kick(argOpener),prio:95});
  const canadaWin=find(m=>m.home==='Canada'&&m.away==='Qatar'&&+(m.homeScore||0)===6);
  if(canadaWin)items.push({id:'canada',kick:kick(canadaWin),prio:90});
  const gerCur=find(m=>m.home==='Germany'&&isCuracao(m.away)&&+(m.awayScore||0)>=1);
  if(gerCur)items.push({id:'curacaoGoal',kick:kick(gerCur),prio:85});
  let best=null,bestMargin=0;
  pool.forEach(m=>{
    const hg=+(m.homeScore||0),ag=+(m.awayScore||0),margin=Math.abs(hg-ag);
    if(margin>bestMargin){bestMargin=margin;best={m,hg,ag};}
  });
  if(best&&bestMargin>=4&&!isCuracao(best.m.away)&&best.m.home!=='Canada'){
    items.push({id:'biggestWin',kick:kick(best.m),prio:45,params:{home:tn(best.m.home),away:tn(best.m.away),hs:best.hg,as:best.ag,margin:bestMargin}});
  }
  let top=null,topG=0;
  pool.forEach(m=>{const t=+(m.homeScore||0)+ +(m.awayScore||0);if(t>topG){topG=t;top=m;}});
  if(top&&topG>=6)items.push({id:'highScoring',kick:kick(top),prio:40,params:{home:tn(top.home),away:tn(top.away),hs:top.homeScore,as:top.awayScore,total:topG}});
  if(pool.length)items.push({id:'goalsPace',kick:0,prio:5,params:{goals:s.goals,played:s.played,avg:s.avgGoals}});
  const seen=new Set();
  return items.filter(i=>{if(seen.has(i.id))return false;seen.add(i.id);return true;})
    .sort((a,b)=>(b.kick-a.kick)||(b.prio-a.prio)).slice(0,5);
}
function buildTournamentSummary(){
  const pool=gatherCompletedPool();
  const g=meta.groupStageProgress||{};
  const total=g.totalGroupMatches||72;
  let goals=0,favW=0,draws=0,upsets=0,decided=0;
  pool.forEach(m=>{
    const hg=+m.homeScore||0,ag=+m.awayScore||0;
    goals+=hg+ag;
    const side=matchOutcomeSide(m);
    if(side==='draw')draws++;
    else if(side==='fav'){favW++;decided++;}
    else if(side==='und'){upsets++;decided++;}
  });
  const played=pool.length;
  return {
    played,total,goals,
    avgGoals:played?(goals/played).toFixed(1):'0.0',
    favW,draws,upsets,decided,
    favWinPct:decided?Math.round((favW/decided)*100):null,
    drawPct:played?Math.round((draws/played)*100):0,
    upsetPct:decided?Math.round((upsets/decided)*100):null,
    md1:g.matchdayCompleted?.[1]??0,
    md2:g.matchdayCompleted?.[2]??0,
    insights:buildWorldCupInsights(pool,{played,goals,avgGoals:played?(goals/played).toFixed(1):'0.0'}),
  };
}

/* ── RENDER COMPLETED ── */
function archivePairKey(m){
  const h=(m.home||'').toLowerCase(),a=(m.away||'').toLowerCase();
  return h<=a?`${h}|${a}`:`${a}|${h}`;
}
function hasFinalScore(m){
  return m.homeScore!=null&&m.awayScore!=null;
}
function buildFinishedPairKeys(){
  const keys=new Set();
  const note=m=>{
    if(isGhostMatch(m))return;
    if(isActiveLive(m))return;
    if(m.type==='COMPLETED'||hasFinalScore(m))keys.add(archivePairKey(m));
  };
  allMatches.forEach(note);
  completedArchive.forEach(note);
  return keys;
}
function isFinishedMatch(m,finishedKeys){
  if(isActiveLive(m))return false;
  if(m.type==='COMPLETED')return true;
  return finishedKeys.has(archivePairKey(m));
}
function gatherStageCompleted(stageName){
  const seen=new Map();
  const ingest=raw=>{
    if(isGhostMatch(raw))return;
    if(!hasFinalScore(raw))return;
    const k=archivePairKey(raw);
    const row={
      ...raw,
      type:'COMPLETED',
      matchday:raw.matchday||assignMatchday(raw.kickoff)||null,
    };
    seen.set(k,seen.has(k)?{...seen.get(k),...row}:row);
  };
  allMatches
    .filter(m=>(m.stage||'Group Stage')===stageName&&m.type==='COMPLETED')
    .forEach(ingest);
  completedArchive
    .filter(m=>(m.stage||'Group Stage')===stageName)
    .forEach(ingest);
  return [...seen.values()].sort((a,b)=>new Date(b.kickoff||0)-new Date(a.kickoff||0));
}
function isRichBoxScore(bs){
  if(!bs)return false;
  if(Array.isArray(bs.goals)&&bs.goals.length>0)return true;
  const sh=bs.shots?.home;
  return sh!=null&&sh!==0;
}
function mergeArchiveData(match){
  const arc=completedArchive.find(a=>String(a.id)===String(match.id)||archivePairKey(a)===archivePairKey(match));
  let merged={...match};
  if(arc){
    const boxScore=isRichBoxScore(arc.boxScore)?arc.boxScore:(isRichBoxScore(merged.boxScore)?merged.boxScore:arc.boxScore||merged.boxScore);
    merged={
      ...merged,
      homeFlag:arc.homeFlag||merged.homeFlag,
      awayFlag:arc.awayFlag||merged.awayFlag,
      homeScore:arc.homeScore??merged.homeScore,
      awayScore:arc.awayScore??merged.awayScore,
      score:arc.score||merged.score,
      boxScore,
      advancedMetrics:arc.advancedMetrics||merged.advancedMetrics,
      insights:(arc.insights&&arc.insights.length)?arc.insights:(merged.insights||[]),
      insight:merged.insight||arc.insight,
      potm:arc.potm||merged.potm||arc.playerOfMatch||merged.playerOfMatch,
    };
  }
  return merged;
}

function teamShortName(name){
  const n=String(name||'').trim();
  if(!n)return'';
  const parts=n.split(/\s+/);
  return parts.length>1&&parts[0].length<=3?parts.join(' '):parts[parts.length-1];
}
function goalScorerLabel(g,homeName,awayName){
  const s=String(g.scorer||'').trim();
  if(s)return s;
  return g.team==='home'?homeName:awayName;
}
function runningScoreAfterGoal(goals,idx){
  const h=goals.slice(0,idx+1).filter(x=>x.team==='home').length;
  const a=goals.slice(0,idx+1).filter(x=>x.team==='away').length;
  return`${h}–${a}`;
}
function buildCompletedScorerSheet(goals,home,away){
  if(!goals.length)return'';
  const homeLines=goals.filter(g=>g.team==='home').map(g=>{
    const min=g.minute!=null?`${g.minute}'`:'';
    const name=goalScorerLabel(g,home,away);
    return`<div class="pc-scorer-line"><span class="pc-scorer-min">${esc(min)}</span>${esc(name)}</div>`;
  }).join('');
  const awayLines=goals.filter(g=>g.team==='away').map(g=>{
    const min=g.minute!=null?`${g.minute}'`:'';
    const name=goalScorerLabel(g,home,away);
    return`<div class="pc-scorer-line">${esc(name)}<span class="pc-scorer-min right">${esc(min)}</span></div>`;
  }).join('');
  return`<div class="pc-scorer-sheet"><div class="pc-scorer-col home">${homeLines||'<span style="color:var(--text-lo);font-style:italic;">—</span>'}</div><div class="pc-scorer-col away">${awayLines||'<span style="color:var(--text-lo);font-style:italic;">—</span>'}</div></div>`;
}
function buildCompletedMomentsHTML(goals,home,away){
  if(!goals.length)return'<div style="color:var(--text-lo);font-style:italic;font-size:11px;">No goals scored.</div>';
  return`<div class="pc-moments-list">${goals.map((g,idx)=>{
    const side=g.team==='home'?'home':'away';
    const teamName=g.team==='home'?home:away;
    const scorer=String(g.scorer||'').trim();
    const min=g.minute!=null?`${g.minute}'`:'—';
    const score=runningScoreAfterGoal(goals,idx);
    const nameLine=scorer
      ?`<span class="pc-moment-name">${esc(scorer)}</span> <span class="pc-moment-team">${esc(teamShortName(teamName))}</span>`
      :`<span class="pc-moment-name">${esc(teamName)}</span> <span class="pc-moment-team">goal</span>`;
    return`<div class="pc-moment-row ${side}"><span class="pc-moment-min">${esc(min)}</span><div>${nameLine}</div><span class="pc-moment-score">${esc(score)}</span></div>`;
  }).join('')}</div>`;
}
function resolvePlayerOfMatch(match,goals,home,away,homeWon,awayWon){
  const bs=match.boxScore,adv=match.advancedMetrics;
  const raw=match.potm||match.playerOfMatch||bs?.playerOfMatch||adv?.potm;
  if(raw){
    if(typeof raw==='string')return{name:raw,team:null,note:null};
    if(typeof raw==='object'){
      const name=raw.name||raw.player||raw.displayName;
      if(name)return{name,team:raw.team||null,note:raw.note||null};
    }
  }
  const winSide=homeWon?'home':awayWon?'away':null;
  const named=goals.filter(g=>String(g.scorer||'').trim());
  let pool=winSide?named.filter(g=>g.team===winSide):named;
  if(!pool.length&&named.length)pool=named;
  if(!pool.length)return null;
  const counts={};
  pool.forEach(g=>{const n=String(g.scorer).trim();counts[n]=(counts[n]||0)+1;});
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]||0)[0];
  const pick=pool.find(g=>String(g.scorer).trim()===top[0]);
  const team=pick?.team==='home'?home:(pick?.team==='away'?away:(winSide==='home'?home:winSide==='away'?away:null));
  const note=top[1]>1?`${top[1]} goals`:null;
  return{name:top[0],team,note};
}

function assignMatchday(kickoff){
  if(!kickoff)return null;
  const dt=new Date(kickoff);
  const d=dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0')+'-'+String(dt.getUTCDate()).padStart(2,'0');
  const h=dt.getUTCHours();
  if(d<='2026-06-17')return 1;
  if(d==='2026-06-18'&&h<6)return 1;
  if(d<='2026-06-23')return 2;
  if(d==='2026-06-24'&&h<6)return 2;
  return 3;
}

function renderGrid(){

  const finishedKeys=buildFinishedPairKeys();
  const seen=new Map();allMatches.forEach(m=>seen.set(m.id,m));
  const all=[...seen.values()];
  const stageM=all.filter(m=>(m.stage||'Group Stage')===currentStage).filter(matchesSearch);
  const live=stageLiveMatches(currentStage);

  const upcoming=showUpcoming
    ?stageM.filter(m=>!isActiveLive(m)&&!isFinishedMatch(m,finishedKeys)&&m.type==='UPCOMING'&&!isLiveWindow(m)).sort((a,b)=>new Date(a.kickoff||0)-new Date(b.kickoff||0))
    :[];
  const completed=showUpcoming?[]:gatherStageCompleted(currentStage).filter(matchesSearch);

  renderLiveSection(live);

  const titleEl=document.getElementById('lbl-grid-state-title');
  const totalEl=document.getElementById('count-grid-state-total');
  const targetGrid=document.getElementById('dynamic-grid-content');
  if(!titleEl||!totalEl||!targetGrid) return;

  if(showUpcoming){
    titleEl.textContent=d.upcoming;
    totalEl.textContent=upcoming.length;

    if(searchQuery||currentSort==='time'){
      targetGrid.innerHTML=upcoming.length?`<div class="card-grid">${upcoming.map(renderUpcoming).join('')}</div>`:`<div class="empty">${esc(d.noUpcoming)}</div>`;
    }else{
      const byGroup={};
      upcoming.forEach(m=>{const g=m.group||m.stage||'Other';if(!byGroup[g])byGroup[g]=[];byGroup[g].push(m);});
      if(expandedGroups.size===0){
        const now=Date.now(),h48=now+48*60*60*1000;let auto=false;
        Object.entries(byGroup).forEach(([g,ms])=>{if(!auto&&ms.some(m=>{const t=new Date(m.kickoff||0).getTime();return t>=now&&t<=h48;})){expandedGroups.add('up-'+g);auto=true;}});
        if(!auto&&Object.keys(byGroup).length>0)expandedGroups.add('up-'+Object.keys(byGroup)[0]);
      }
      targetGrid.innerHTML=upcoming.length===0?`<div class="empty">${esc(d.noUpcoming)}</div>`:
        Object.entries(byGroup).map(([group,matches])=>{
          const key='up-'+group,isOpen=expandedGroups.has(key),nk=matches[0]?fmtKO(matches[0].kickoff):'';
          return`<div class="group-section"><button class="group-header" onclick="toggleGroup('${esc(key)}')"><span class="group-header-label">${esc(group)}</span><span class="group-header-meta">${esc(nk)} · ${matches.length} match${matches.length!==1?'es':''}</span><span class="group-header-chevron">${isOpen?'▲':'▼'}</span></button>${isOpen?`<div class="group-body"><div class="card-grid">${matches.map(renderUpcoming).join('')}</div></div>`:''}</div>`;
        }).join('');
    }
  }else{
    titleEl.textContent=d.completed;
    totalEl.textContent=completed.length;
    targetGrid.innerHTML=`<div class="empty">Loading completed matches…</div>`;

    const byMatchday={};
    completed.forEach(m=>{
      const md=m.matchday||assignMatchday(m.kickoff)||0;
      if(!byMatchday[md])byMatchday[md]={};
      const day=formatCalendarDay(m.kickoff);
      if(!byMatchday[md][day])byMatchday[md][day]=[];
      byMatchday[md][day].push(m);
    });

    const mdOrder=Object.keys(byMatchday).map(Number).filter(n=>!isNaN(n)).sort((a,b)=>b-a);
    let html=groupStageProgressHTML();
    if(!completed.length){
      html+=`<div class="empty">${esc(d.noCompleted)}</div>`;
    }else if(!mdOrder.length){
      html+=`<div class="card-grid">${completed.map(safeCompletedCard).join('')}</div>`;
    }else{
      mdOrder.forEach(md=>{
        const days=byMatchday[md];
        const count=Object.values(days).reduce((n,ms)=>n+ms.length,0);
        const done=count>=24?` · ${esc(d.matchdayComplete)}`:'';
        html+=`<div class="matchday-section"><div class="matchday-header"><span>${esc(matchdayLabel(md))}</span> — ${count} / 24${done}</div>`;
        const dayKeys=Object.keys(days).sort((a,b)=>new Date(days[b][0]?.kickoff||0)-new Date(days[a][0]?.kickoff||0));
        dayKeys.forEach(dayString=>{
          const matches=days[dayString].sort((a,b)=>new Date(b.kickoff||0)-new Date(a.kickoff||0));
          html+=`<div class="completed-day-block"><div class="completed-day-header">📅 ${esc(dayString)} · ${matches.length} match${matches.length!==1?'es':''}</div><div class="card-grid">${matches.map(safeCompletedCard).join('')}</div></div>`;
        });
        html+=`</div>`;
      });
    }
    targetGrid.innerHTML=html;
  }
  renderTournamentSummary();
}

/* ── BRACKET ── */
const ZONE_GROUPS={mexico:['Group A','Group B','Group C'],central:['Group D','Group E','Group F'],east:['Group G','Group H','Group I'],west:['Group J','Group K','Group L']};
const ZONE_ORDER=['mexico','central','east','west'];
let currentBracketZone='mexico';
function avgPct(match,field){const v=(match.layers||[]).map(l=>parseFloat(l[field])).filter(v=>!isNaN(v));return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null;}
function buildBracketNode(match,opts={}){
  const d=DICT[lang];if(!match)return`<div class="bracket-tbd-node">${esc(d.waitingFor||'TBD')}</div>`;
  const home=tn(match.home),away=tn(match.away),favIsHome=match.favTeam===match.home;
  let hc='',ac='',hp='',ap='',dt='';
  if(match.type==='COMPLETED'){const hw=match.score&&match.score.toUpperCase().includes(match.home.toUpperCase().split(' ')[0]);hc=hw?'is-winner':'is-eliminated';ac=hw?'is-eliminated':'is-winner';hp=hw?'✓':'—';ap=hw?'—':'✓';}
  else{const fp=avgPct(match,'fav'),up=avgPct(match,'und'),dp=avgPct(match,'draw');hp=fp!=null?fp.toFixed(1)+'%':'--';ap=up!=null?up.toFixed(1)+'%':'--';hc=favIsHome?'fav':'und';ac=favIsHome?'und':'fav';if(dp!=null)dt=`<div class="bracket-draw-tag">Draw ${dp.toFixed(1)}%</div>`;}
  const nc=opts.noConnector?' no-connector':'';
  return`<div class="bracket-node${nc}"><div class="bracket-team-row ${hc}"><div class="flag">${flagHTML(match.homeFlag)}</div><span class="bracket-team-name">${esc(home)}</span><span class="bracket-pct ${hc}">${esc(hp)}</span></div><div class="bracket-team-row ${ac}"><div class="flag">${flagHTML(match.awayFlag)}</div><span class="bracket-team-name">${esc(away)}</span><span class="bracket-pct ${ac}">${esc(ap)}</span></div>${dt}</div>`;
}
function buildBracketZoneTabs(){
  const d=DICT[lang],zn={mexico:d.zoneMex||'Mexico Zone',central:d.zoneCen||'Central Zone',east:d.zoneEast||'East Zone',west:d.zoneWest||'West Zone'};
  const c=document.getElementById('bracket-zone-tabs');if(!c)return;
  c.innerHTML=ZONE_ORDER.map(z=>`<button class="btn${z===currentBracketZone?' active':''}" onclick="switchBracketZone('${z}')">${esc(zn[z])}</button>`).join('');
}
function switchBracketZone(z){currentBracketZone=z;buildBracketZoneTabs();renderBracket();}
function renderBracket(){
  const d=DICT[lang];buildBracketZoneTabs();
  const c=document.getElementById('bracket-zone-simple');if(!c)return;
  const groups=ZONE_GROUPS[currentBracketZone]||[];
  const gm=allMatches.filter(m=>m.stage==='Group Stage'&&groups.includes(m.group||''));
  const r32=allMatches.filter(m=>m.stage==='Round of 32'&&groups.includes(m.bracketZone||m.group||''));
  const r16=allMatches.filter(m=>m.stage==='Round of 16'&&groups.includes(m.bracketZone||m.group||''));
  const gz=groups.filter(g=>allMatches.some(m=>(m.group||'')===g));
  let html=`<div class="zone-bracket-grid">`;
  html+=`<div class="zone-round-col"><div class="zone-round-header">${esc(d.groupStage||'Group Stage')}</div>`;
  gz.forEach(g=>{gm.filter(m=>(m.group||'')===g).forEach(m=>{html+=buildBracketNode(m);});html+=`<div style="height:8px"></div>`;});
  if(!gz.length)html+=`<div class="bracket-tbd-node">${esc(d.noUpcoming)}</div>`;
  html+=`</div><div class="zone-round-col"><div class="zone-round-header">${esc(d.bracketR32||'Round of 32')}</div>`;
  if(r32.length)r32.forEach(m=>{html+=buildBracketNode(m);});
  else{const slots=Math.ceil(gz.reduce((a,g)=>a+gm.filter(m=>m.group===g).length,0)/2);for(let i=0;i<Math.max(slots,1);i++)html+=buildBracketNode(null);}
  html+=`</div><div class="zone-round-col"><div class="zone-round-header">${esc(d.bracketR16||'Round of 16')}</div>`;
  if(r16.length)r16.forEach(m=>{html+=buildBracketNode(m);});else html+=buildBracketNode(null);
  html+=`</div><div class="zone-round-col"><div class="zone-round-header">${esc(d.bracketQF||'QF')}</div><div class="bracket-tbd-node" style="margin-top:40px">${esc(d.waitingFor||'TBD')}</div></div></div>`;
  c.innerHTML=html;c.classList.add('active');
}

/* ── LABELS / SWITCHES ── */
function applyLabels(){
  const d=DICT[lang];
  document.getElementById('lbl-meta').textContent=d.meta;
  document.getElementById('lbl-view').textContent=d.view;
  document.getElementById('lbl-stage').textContent=d.stage;
  document.getElementById('btn-grid').textContent=d.grid;
  document.getElementById('btn-bracket').textContent=d.bracket;
  
  document.getElementById('btn-state-upcoming').textContent = d.upcoming;
  document.getElementById('btn-state-completed').textContent = d.completed;
  
  const si=document.getElementById('search-input');if(si)si.placeholder=d.searchPlaceholder||'Search teams…';
  if(meta.lastUpdated)document.getElementById('lbl-updated').textContent=`${d.updated}: ${meta.lastUpdated}`;
  ['en','ko','ja'].forEach(l=>{document.getElementById('lang-'+l).className='btn'+(l===lang?' lang-active':'');});
  syncMatchStateUI();
  renderTournamentSummary();
}
function switchView(v){
  currentView=v;
  document.getElementById('view-grid').classList.toggle('active',v==='grid');
  document.getElementById('view-bracket').classList.toggle('active',v==='bracket');
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-bracket').classList.toggle('active',v==='bracket');
  
  document.getElementById('state-filter-row').style.display = v==='grid' ? 'flex' : 'none';
  
  const sw=document.getElementById('search-wrap');if(sw)sw.style.display=v==='grid'?'':'none';
  if(v==='bracket')renderBracket();else{renderTournamentSummary();renderGrid();}
}
function switchStage(s){currentStage=s;buildStageTabs();if(currentView==='bracket')renderBracket();else renderGrid();}
function switchLang(l){lang=l;applyLabels();buildStageTabs();if(currentView==='bracket')renderBracket();else renderGrid();}
function switchSort(m){currentSort=m;expandedGroups.clear();applyLabels();renderGrid();}
function onSearch(v){searchQuery=v.trim().toLowerCase();const c=document.getElementById('search-clear');if(c)c.classList.toggle('visible',searchQuery.length>0);renderGrid();}
function clearSearch(){searchQuery='';const i=document.getElementById('search-input');if(i)i.value='';const c=document.getElementById('search-clear');if(c)c.classList.remove('visible');renderGrid();}
function matchesSearch(m){if(!searchQuery)return true;const he=(m.home||'').toLowerCase(),ae=(m.away||'').toLowerCase(),ht=tn(m.home).toLowerCase(),at=tn(m.away).toLowerCase(),g=(m.group||'').toLowerCase();return he.includes(searchQuery)||ae.includes(searchQuery)||ht.includes(searchQuery)||at.includes(searchQuery)||g.includes(searchQuery);}

/* ── DATA LOAD ── */
const KNOWN_WC_TEAMS=new Set(["Mexico","South Africa","South Korea","Czechia","Canada","Bosnia & Herzegovina","United States","Paraguay","Qatar","Switzerland","Brazil","Morocco","Haiti","Scotland","Australia","Turkey","Germany","Curacao","Netherlands","Japan","Ivory Coast","Ecuador","Sweden","Tunisia","Spain","Cape Verde","Belgium","Egypt","Saudi Arabia","Uruguay","Iran","New Zealand","France","Senegal","Austria","Jordan","DR Congo","England","Croatia","Ghana","Panama","Uzbekistan","Colombia","Italy","Argentina","Portugal","Denmark","Norway","Serbia","Poland","Nigeria","Cameroon","Algeria","Costa Rica","Wales","Iraq"]);
function isGhostMatch(m){
  if(!m||typeof m!=='object')return true;
  const srl=/\bsrl\b|simulator|simulated|sim league/i;
  for(const k of ['home','away','favTeam','undTeam','id']){if(srl.test(String(m[k]||'')))return true;}
  if(m.home&&!KNOWN_WC_TEAMS.has(m.home))return true;
  if(m.away&&!KNOWN_WC_TEAMS.has(m.away))return true;
  return false;
}
function sanitizeMatches(raw){
  const seen=new Map();
  for(const m of (raw||[])){
    if(isGhostMatch(m))continue;
    const id=String(m.id||`${m.home}|${m.away}`);
    if(!seen.has(id))seen.set(id,m);
  }
  return [...seen.values()];
}
async function fetchJson(url,timeoutMs=15000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const res=await fetch(url,{cache:'no-store',signal:ctrl.signal});
    if(!res.ok)throw new Error('Could not load data (HTTP '+res.status+')');
    return await res.json();
  }finally{clearTimeout(timer);}
}
function showError(msg){
  const p=document.getElementById('status-pane');
  if(!p)return;
  p.style.display='';
  p.className='status-pane error';
  p.innerHTML='⚠ '+esc(msg);
}
async function loadData(){
  try{
    const json=await fetchJson('data.json?v='+Date.now());
    if(!Array.isArray(json.matches))throw new Error('data.json missing "matches" array');
    allMatches=sanitizeMatches(json.matches);
    if(Array.isArray(json.knockoutEliminated))knockoutEliminated=new Set(json.knockoutEliminated.map(normalizeTeamName));
    else knockoutEliminated=new Set();
    try{const cj=await fetchJson('completed_matches.json?v='+Date.now());if(Array.isArray(cj))completedArchive=cj;}catch(e){}
    meta={lastUpdated:json.lastUpdated,currentStage:json.currentStage,groupStageProgress:json.groupStageProgress};
    if(meta.currentStage)currentStage=meta.currentStage;
    document.getElementById('status-pane').style.display='none';
    document.getElementById('view-grid').classList.add('active');
    applyLabels();buildStageTabs();bindFilterControls();applyViewChrome(currentMatchState);
    await syncEspnLiveStatus();
    try{renderGrid();}catch(renderErr){console.error(renderErr);showError('Could not render match grid.');return;}
    renderTournamentSummary();
    startLivePolling();
    syncEspnLiveStatus().then(changed=>{
      if(!changed)return;
      try{if(currentView==='bracket')renderBracket();else renderMatchGrid();}catch(e){console.error(e);}
      startLivePolling();
    });
    setInterval(async()=>{
      try{
        const j=await fetchJson('data.json?v='+Date.now());
        if(Array.isArray(j.matches)){
          allMatches=sanitizeMatches(j.matches);meta.lastUpdated=j.lastUpdated;meta.groupStageProgress=j.groupStageProgress;
          if(Array.isArray(j.knockoutEliminated))knockoutEliminated=new Set(j.knockoutEliminated.map(normalizeTeamName));
        }
        try{
          const cj=await fetchJson('completed_matches.json?v='+Date.now());
          if(Array.isArray(cj))completedArchive=cj;
        }catch(e){}
        await syncEspnLiveStatus();
        applyLabels();
        try{if(currentView==='bracket')renderBracket();else renderGrid();}catch(e){console.error(e);}
        startLivePolling();
      }catch(e){}
    },60000);
  }catch(e){console.error(e);showError(e.name==='AbortError'?'Timed out loading data.json.':e.message);}
}
bindFilterControls();applyViewChrome(currentMatchState);applyLabels();loadData();
