<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Prediction Tracker</title>
<style>
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1c2030;--surface3:#212638;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --text-hi:#f0f4ff;--text-mid:#c8d0dc;--text-lo:#5a6478;
  --gold:#e8a020;--gold-hi:#f0b429;--neon:#38bdf8;
  --green:#3cac3b;--red:#e61d25;--amber:#f59e0b;--purple:#a78bfa;--blue:#60a5fa;
  --signal-back:#3cac3b;--signal-draw:#f59e0b;--signal-upset:#e61d25;
  --signal-value:#a78bfa;--signal-lean:#38bdf8;
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,"SF Pro Display","Segoe UI",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text-hi);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
button:focus-visible{outline:2px solid var(--neon);outline-offset:2px;}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0a0c10 0%,#0f1520 50%,#1a1208 100%);
  padding:28px 20px 24px;min-height:160px;
  display:flex;align-items:center;
}
.hero::before{
  content:'';position:absolute;top:0;right:0;width:60%;height:100%;
  background:radial-gradient(ellipse at 80% 50%,rgba(232,160,32,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.hero-text{position:relative;z-index:2;flex:1;}
.hero-eyebrow{
  font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'⚡';}
.hero-title{
  font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1;
  color:var(--gold);letter-spacing:-1px;margin-bottom:4px;
}
.hero-subtitle{font-size:clamp(18px,4vw,28px);font-weight:900;color:var(--text-hi);letter-spacing:-0.5px;margin-bottom:10px;}
.hero-meta{font-size:11px;color:var(--text-mid);opacity:0.8;}
.hero-updated{font-size:10px;color:var(--gold);margin-top:4px;opacity:0.7;}
.hero-img{
  position:absolute;right:0;top:0;width:45%;height:100%;
  pointer-events:none;z-index:1;overflow:hidden;
}
.hero-img img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  -webkit-mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  mix-blend-mode:luminosity;opacity:0.55;
}
@media(max-width:480px){.hero-img{width:38%;}}

/* ── SHELL ── */
.shell{max-width:820px;margin:0 auto;padding:12px 10px 40px;}
@media(min-width:700px){.shell{max-width:1140px;}}

/* ── CONTROLS ── */
.controls{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);padding:12px 14px;
  margin-bottom:10px;display:flex;flex-direction:column;gap:8px;
  position:sticky;top:0;z-index:100;
}
.controls-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.controls-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);min-width:50px;}
.btn{
  font-size:11px;font-weight:700;padding:6px 14px;
  border-radius:20px;border:1px solid var(--border-hi);
  color:var(--text-mid);background:rgba(255,255,255,0.03);
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{color:var(--text-hi);border-color:rgba(255,255,255,0.25);}
.btn.active{color:var(--gold);border-color:var(--gold);background:rgba(232,160,32,0.08);}
.stage-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.stage-tabs::-webkit-scrollbar{display:none;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{
  width:100%;padding:10px 36px 10px 14px;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--radius-sm);color:var(--text-hi);
  font-family:var(--font);font-size:13px;font-weight:500;
  outline:none;transition:border-color 0.15s;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--text-lo);}
.search-input:focus{border-color:var(--gold);}

/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:center;gap:10px;padding:14px 0 8px;}
.section-head-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.section-head-line{flex:1;height:1px;background:var(--border);}
.section-head-count{font-size:10px;font-weight:700;color:var(--text-lo);}

/* ── VIEW PANELS ── */
.view-panel{display:none;}.view-panel.active{display:block;}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;position:relative;isolation:isolate;
  padding:14px;display:flex;flex-direction:column;gap:10px;
}
.match-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:8px;}
.match-teams{display:flex;flex-direction:column;gap:6px;flex:1;}
.team-row{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.match-meta-col{text-align:right;font-size:11px;color:var(--text-mid);}
.score-display{font-size:16px;font-weight:900;color:var(--gold);margin-left:auto;padding-right:15px;}
.layers-container{display:flex;flex-direction:column;gap:4px;background:rgba(0,0,0,0.15);padding:8px;border-radius:6px;font-size:12px;}
.layer-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:4px;padding:2px 0;}
.layer-source{color:var(--text-mid);font-weight:600;}
.layer-val{text-align:center;font-variant-numeric:tabular-nums;}

.card-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:720px){.card-grid{grid-template-columns:1fr 1fr;}}
.empty{text-align:center;padding:40px;color:var(--text-lo);font-style:italic;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-text">
    <div class="hero-eyebrow">2026 FIFA World Cup</div>
    <div class="hero-title">THE ROAD</div>
    <div class="hero-subtitle">TO 2026</div>
    <div class="hero-meta" id="lbl-meta">Sportsbooks · ELO/Poisson Model · Prediction Markets</div>
    <div class="hero-updated" id="lbl-updated">Loading configuration...</div>
  </div>
</div>

<div class="shell">
  <div class="controls">
    <div class="controls-row">
      <span class="controls-label">Status</span>
      <button class="btn active" id="btn-state-upcoming" onclick="switchMatchState('upcoming')">Upcoming Matches</button>
      <button class="btn" id="btn-state-completed" onclick="switchMatchState('completed')">Completed Matches</button>
    </div>
    <div class="controls-row">
      <span class="controls-label">Search</span>
      <div class="search-wrap" style="flex:1;">
        <input type="text" id="search-input" class="search-input" placeholder="Filter by team name..." oninput="handleSearch()">
      </div>
    </div>
  </div>

  <div class="section-head">
    <div class="section-head-label" id="section-title">Matches</div>
    <div class="section-head-line"></div>
    <div class="section-head-count" id="match-count">0 matches</div>
  </div>

  <div id="grid-container" class="card-grid"></div>
</div>

<script>
let globalData = { matches: [] };
let currentFilterState = 'upcoming'; // 'upcoming' handles UPCOMING & IN_PLAY, 'completed' handles COMPLETED
let searchQuery = '';

async function loadDashboardData() {
  try {
    const response = await fetch('data.json');
    if (!response.ok) throw new Error('Failed to load data.json payload');
    globalData = await response.json();
    
    document.getElementById('lbl-updated').textContent = `Last Database Sync: ${globalData.lastUpdated || 'N/A'}`;
    renderDashboard();
  } catch (error) {
    console.error(error);
    document.getElementById('grid-container').innerHTML = `<div class="empty">Error loading match data execution context. Please verify data.json presence.</div>`;
  }
}

function switchMatchState(state) {
  currentFilterState = state;
  document.getElementById('btn-state-upcoming').classList.toggle('active', state === 'upcoming');
  document.getElementById('btn-state-completed').classList.toggle('active', state === 'completed');
  
  document.getElementById('section-title').textContent = state === 'upcoming' ? 'Upcoming & Live Actions' : 'Completed Archive';
  renderDashboard();
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  renderDashboard();
}

function renderDashboard() {
  const container = document.getElementById('grid-container');
  container.innerHTML = '';

  // Filter based on selected UI layout toggle state
  const filteredMatches = globalData.matches.filter(match => {
    const matchesSearch = !searchQuery || 
                          match.home.toLowerCase().includes(searchQuery) || 
                          match.away.toLowerCase().includes(searchQuery);
                          
    if (!matchesSearch) return false;

    if (currentFilterState === 'upcoming') {
      return match.type === 'UPCOMING' || match.type === 'IN_PLAY';
    } else {
      return match.type === 'COMPLETED';
    }
  });

  document.getElementById('match-count').textContent = `${filteredMatches.length} match(es) located`;

  if (filteredMatches.length === 0) {
    container.innerHTML = `<div class="empty">No entries match the active filter criteria.</div>`;
    return;
  }

  filteredMatches.forEach(match => {
    const card = document.createElement('div');
    card.className = 'match-card';

    let scoreOrLiveMarkup = '';
    if (match.type === 'IN_PLAY') {
      scoreOrLiveMarkup = `<div class="score-display" style="color:var(--red)">LIVE: ${match.liveScore || '0 - 0'}</div>`;
    } else if (match.type === 'COMPLETED') {
      scoreOrLiveMarkup = `<div class="score-display">${match.homeScore} - ${match.awayScore}</div>`;
    }

    let layersMarkup = '';
    if (match.layers && match.layers.length > 0) {
      layersMarkup = `
        <div class="layers-container">
          <div class="layer-row" style="color:var(--text-lo); font-size:10px; font-weight:800; text-transform:uppercase;">
            <span>Source</span><span style="text-align:center;">Home</span><span style="text-align:center;">Draw</span><span style="text-align:center;">Away</span>
          </div>
          ${match.layers.map(layer => `
            <div class="layer-row">
              <span class="layer-source">${layer.source}</span>
              <span class="layer-val" style="color:var(--green)">${layer.fav || '--'}</span>
              <span class="layer-val" style="color:var(--neon)">${layer.draw || '--'}</span>
              <span class="layer-val" style="color:var(--red)">${layer.und || '--'}</span>
            </div>
          `).join('')}
        </div>`;
    }

    card.innerHTML = `
      <div class="match-header">
        <div class="match-teams">
          <div class="team-row"><span>⚽</span> ${match.home}</div>
          <div class="team-row"><span>🛡️</span> ${match.away}</div>
        </div>
        ${scoreOrLiveMarkup}
        <div class="match-meta-col">
          <div>${match.group || 'Group Stage'}</div>
          <div style="font-size:10px; opacity:0.7; margin-top:3px;">${match.meta || ''}</div>
        </div>
      </div>
      ${layersMarkup}
    `;
    container.appendChild(card);
  });
}

// Initial Ingestion Trigger Execution
window.addEventListener('DOMContentLoaded', loadDashboardData);
</script>

</body>
</html>
