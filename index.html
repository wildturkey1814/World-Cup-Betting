<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup · Prediction Tracker</title>
<style>
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1c2030;--surface3:#212638;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --text-hi:#f0f4ff;--text-mid:#c8d0dc;--text-lo:#5a6478;
  --gold:#e8a020;--gold-hi:#f0b429;--neon:#38bdf8;
  --green:#3cac3b;--red:#e61d25;--amber:#f59e0b;--purple:#a78bfa;--blue:#60a5fa;
  --signal-back:#3cac3b;--signal-draw:#f59e0b;--signal-upset:#e61d25;
  --signal-value:#a78bfa;--signal-lean:#38bdf8;
  --radius:12px;--radius-sm:8px;
  --font:-apple-system,"SF Pro Display","Segoe UI",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text-hi);min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
button:focus-visible{outline:2px solid var(--neon);outline-offset:2px;}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0a0c10 0%,#0f1520 50%,#1a1208 100%);
  padding:28px 20px 24px;min-height:160px;
  display:flex;align-items:center;
}
.hero::before{
  content:'';position:absolute;top:0;right:0;width:60%;height:100%;
  background:radial-gradient(ellipse at 80% 50%,rgba(232,160,32,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.hero-text{position:relative;z-index:2;flex:1;}
.hero-eyebrow{
  font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.hero-eyebrow::before{content:'⚡';}
.hero-title{
  font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1;
  color:var(--gold);letter-spacing:-1px;margin-bottom:4px;
}
.hero-subtitle{font-size:clamp(18px,4vw,28px);font-weight:900;color:var(--text-hi);letter-spacing:-0.5px;margin-bottom:10px;}
.hero-meta{font-size:11px;color:var(--text-mid);opacity:0.8;}
.hero-updated{font-size:10px;color:var(--gold);margin-top:4px;opacity:0.7;}
.hero-img{
  position:absolute;right:0;top:0;width:45%;height:100%;
  pointer-events:none;z-index:1;overflow:hidden;
}
.hero-img img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  -webkit-mask-image:linear-gradient(to left,black 30%,rgba(0,0,0,0.6) 60%,transparent 100%);
  mix-blend-mode:luminosity;opacity:0.55;
}
@media(max-width:480px){.hero-img{width:38%;}}

/* ── SHELL ── */
.shell{max-width:820px;margin:0 auto;padding:12px 10px 40px;}
@media(min-width:700px){.shell{max-width:1140px;}}

/* ── CONTROLS ── */
.controls{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);padding:12px 14px;
  margin-bottom:10px;display:flex;flex-direction:column;gap:8px;
  position:sticky;top:0;z-index:100;
}
.controls-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.controls-label{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mid);min-width:50px;}
.btn{
  font-size:11px;font-weight:700;padding:6px 14px;
  border-radius:20px;border:1px solid var(--border-hi);
  color:var(--text-mid);background:rgba(255,255,255,0.03);
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{color:var(--text-hi);border-color:rgba(255,255,255,0.25);}
.btn.active{color:var(--gold);border-color:var(--gold);background:rgba(232,160,32,0.08);}
.btn.lang-active{border-color:var(--neon);color:var(--neon);background:rgba(56,189,248,0.08);}
.stage-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.stage-tabs::-webkit-scrollbar{display:none;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{
  width:100%;padding:10px 36px 10px 14px;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--radius-sm);color:var(--text-hi);
  font-family:var(--font);font-size:13px;font-weight:500;
  outline:none;transition:border-color 0.15s;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--text-lo);}
.search-input:focus{border-color:var(--gold);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-lo);font-size:16px;cursor:pointer;display:none;padding:2px 4px;}
.search-clear.visible{display:block;}

/* ── SIGNAL LEGEND ── */
.signal-legend{
  display:flex;flex-wrap:wrap;gap:10px;padding:8px 4px 12px;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-mid);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:center;gap:10px;padding:14px 0 8px;}
.section-head-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.section-head-line{flex:1;height:1px;background:var(--border);}
.section-head-count{font-size:10px;font-weight:700;color:var(--text-lo);}

/* ── VIEW PANELS ── */
.view-panel{display:none;}.view-panel.active{display:block;}

/* ── LIVE NOW BANNER ── */
.live-now-banner{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;margin-bottom:8px;
  background:rgba(230,29,37,0.12);border:1px solid rgba(230,29,37,0.3);
  border-radius:var(--radius-sm);
  font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);
}
.live-pulse{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse-dot 1.2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
@media(prefers-reduced-motion:reduce){.live-pulse{animation:none;}}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:10px;
  overflow:hidden;position:relative;isolation:isolate;
  box-shadow:inset 3px 0 0 var(--signal-back);
  transition:box-shadow 0.2s,transform 0.15s;
}
.match-card:hover{transform:translateY(-1px);}
.match-card[data-signal="draw"]{box-shadow:inset 3px 0 0 var(--signal-draw);}
.match-card[data-signal="upset"]{box-shadow:inset 3px 0 0 var(--signal-upset);}
.match-card[data-signal="value"]{box-shadow:inset 3px 0 0 var(--signal-value);}
.match-card[data-signal="lean"]{box-shadow:inset 3px 0 0 var(--signal-lean);}
.match-card[data-signal="back"]{box-shadow:inset 3px 0 0 var(--signal-back);}
.match-card[data-signal="done"]{box-shadow:inset 3px 0 0 var(--text-lo);}
.match-card[data-signal="live"]{box-shadow:inset 3px 0 0 var(--red),0 0 20px rgba(230,29,37,0.15);}

/* ── PLAYER IMAGE ── */
.player-img-wrap{position:absolute;top:0;right:0;width:48%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.player-img-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center top;display:block;
  mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.05) 12%,rgba(0,0,0,0.4) 35%,rgba(0,0,0,0.75) 58%,black 80%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.05) 12%,rgba(0,0,0,0.4) 35%,rgba(0,0,0,0.75) 58%,black 80%);
  opacity:0.40;mix-blend-mode:luminosity;transition:opacity 0.3s;
}
.match-card:hover .player-img-wrap img{opacity:0.52;}
.match-header>*,.sources-table,.reco-bar,.win-odds-panel{position:relative;z-index:1;}
.match-card.has-player-img{border-right:1px solid rgba(232,160,32,0.12);}
@media(max-width:400px){.player-img-wrap{display:none;}}

/* ── MATCH HEADER ── */
.match-header{
  padding:13px 14px 11px 18px;
  display:grid;grid-template-columns:1fr auto;
  gap:8px;align-items:start;border-bottom:1px solid var(--border);
}
.match-teams{display:flex;flex-direction:column;gap:6px;}
.team-row{display:flex;align-items:center;gap:8px;}
.flag{width:22px;height:15px;border-radius:2px;overflow:hidden;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.5);}
.flag svg{width:100%;height:100%;display:block;}
.team-name{font-size:15px;font-weight:800;color:var(--text-hi);line-height:1;}
.team-badge{font-size:8px;font-weight:800;letter-spacing:0.5px;padding:2px 6px;border-radius:4px;margin-left:2px;}
.badge-fav{background:rgba(60,172,59,0.15);color:var(--green);border:1px solid rgba(60,172,59,0.3);}
.badge-und{background:rgba(230,29,37,0.1);color:var(--red);border:1px solid rgba(230,29,37,0.25);}
.match-meta-col{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.match-group-tag{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  color:var(--gold);background:rgba(232,160,32,0.1);
  border:1px solid rgba(232,160,32,0.2);padding:2px 7px;border-radius:4px;
}
.match-kickoff{font-size:10px;color:var(--text-mid);font-weight:600;}

/* ── LIVE CARD SPECIFICS ── */
.live-card-banner{
  background:linear-gradient(90deg,rgba(230,29,37,0.18),rgba(230,29,37,0.05));
  padding:7px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(230,29,37,0.2);
  animation:live-pulse-bg 2s ease-in-out infinite;
}
@keyframes live-pulse-bg{0%,100%{opacity:1;}50%{opacity:0.7;}}
.live-card-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:6px;}
.live-score-big{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:3px;}
.live-minute{font-size:11px;font-weight:800;color:var(--red);display:flex;align-items:center;gap:4px;}

/* ── SOURCE TABLE ── */
.sources-table{width:100%;padding:0 18px;}
.sources-header{display:grid;grid-template-columns:1fr 68px 68px 68px;padding:7px 0 5px;border-bottom:1px solid var(--border);}
.sources-header span{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-lo);text-align:center;}
.sources-header span:first-child{text-align:left;}
.source-row{display:grid;grid-template-columns:1fr 68px 68px 68px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;}
.source-row:last-child{border-bottom:none;}
.source-name{font-size:11px;font-weight:600;color:var(--text-mid);}
.prob-cell{font-size:13px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--text-mid);}
.prob-cell.hi{color:var(--text-hi);}
.prob-cell.null-val{color:var(--text-lo);font-size:11px;}
.col-fav-label{color:var(--green)!important;}
.col-draw-label{color:var(--neon)!important;}
.col-und-label{color:var(--red)!important;}

/* ── SUPERCHARGER ROW ── */
.supercharger-row{
  display:grid;grid-template-columns:1fr 68px 68px 68px;
  padding:7px 0 6px;
  border-top:1px solid rgba(232,160,32,0.15);
  margin-top:2px;
}
.supercharger-label{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:800;letter-spacing:0.5px;
  background:linear-gradient(90deg,var(--gold),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sc-info-btn{
  width:14px;height:14px;border-radius:50%;
  border:1px solid rgba(232,160,32,0.5);background:rgba(232,160,32,0.1);
  color:var(--gold);font-size:8px;font-weight:800;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;font-style:italic;font-family:Georgia,serif;flex-shrink:0;
}

/* ── WIN ODDS PANEL ── */
.win-odds-panel{
  margin:0 18px 10px;padding:8px 10px;
  background:rgba(167,139,250,0.05);
  border:1px solid rgba(167,139,250,0.15);
  border-radius:var(--radius-sm);
}
.win-odds-header{
  font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--purple);margin-bottom:6px;
}
.win-odds-grid{display:flex;flex-direction:column;gap:3px;}
.win-odds-row{display:grid;grid-template-columns:1fr 80px 80px;align-items:center;gap:4px;}
.win-odds-source{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text-mid);}
.win-odds-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.win-odds-val{font-size:12px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--text-mid);}
.win-odds-val.hi{color:var(--text-hi);}
.win-odds-val.null{color:var(--text-lo);font-size:11px;}

/* ── RECO BAR ── */
.reco-bar{margin:0 18px 12px;padding:10px 12px;border-radius:var(--radius-sm);margin-top:8px;}
.reco-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.reco-info-btn{
  flex-shrink:0;width:20px;height:20px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);
  color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.15s;font-style:italic;font-family:Georgia,serif;
}
.reco-info-btn:hover{border-color:var(--gold);background:rgba(232,160,32,0.12);}
.reco-title{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-hi);flex:1;}
.reco-call{font-size:15px;font-weight:800;line-height:1.2;margin-bottom:4px;}
.reco-sub{font-size:11px;font-weight:500;color:var(--text-mid);line-height:1.4;}
.reco-tooltip{display:none;position:fixed;background:#1a2030;border:1px solid var(--border-hi);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--text-mid);line-height:1.6;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.7);max-width:min(280px,85vw);pointer-events:none;}
.reco-tooltip.visible{display:block;}
.reco-tooltip-title{font-weight:700;color:var(--text-hi);font-size:12px;margin-bottom:5px;}
.reco-back{background:rgba(60,172,59,0.08);border:1px solid rgba(60,172,59,0.2);}
.reco-draw{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);}
.reco-upset{background:rgba(230,29,37,0.08);border:1px solid rgba(230,29,37,0.2);}
.reco-value{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);}
.reco-lean{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);}
.reco-back .reco-call{color:var(--green);}
.reco-draw .reco-call{color:var(--amber);}
.reco-upset .reco-call{color:var(--red);}
.reco-value .reco-call{color:var(--purple);}
.reco-lean .reco-call{color:var(--neon);}

/* ── COMPLETED CARD ── */
.score-block{padding:10px 18px 12px;}
.score-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border-hi);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;font-weight:800;color:var(--gold);letter-spacing:0.5px;margin-bottom:8px;}
.audit-grid{display:flex;flex-direction:column;gap:3px;}
.audit-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.audit-source{font-size:11px;color:var(--text-mid);}
.audit-mark{font-size:16px;font-weight:800;}
.audit-correct{color:var(--green);}.audit-incorrect{color:var(--red);}
.insight-row{margin-top:8px;padding:7px 10px;background:rgba(232,160,32,0.05);border-radius:var(--radius-sm);border-left:2px solid rgba(232,160,32,0.3);font-size:11px;color:var(--text-mid);line-height:1.5;}
.insight-label{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:3px;}

/* ── GROUP COLLAPSIBLE ── */
.group-section{margin-bottom:6px;}
.group-header{width:100%;display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);cursor:pointer;text-align:left;transition:background 0.15s;}
.group-header:hover{background:rgba(255,255,255,0.06);}
.group-header-label{font-size:12px;font-weight:800;color:var(--text-hi);letter-spacing:0.3px;}
.group-header-meta{font-size:11px;color:var(--text-mid);flex:1;}
.group-header-chevron{font-size:10px;color:var(--text-lo);}
.group-body{padding-top:6px;}
.empty{text-align:center;padding:40px 20px;color:var(--text-lo);font-size:13px;}

/* ── BRACKET ── */
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.bracket-zone-tabs{display:flex;gap:6px;padding:12px 0 10px;flex-wrap:wrap;}
.bracket-zone-simple{display:none;}
.bracket-zone-simple.active{display:block;overflow-x:auto;}
.bracket-node{margin:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:visible;position:relative;}
.bracket-node::after{content:'';position:absolute;right:-9px;top:50%;width:9px;height:1px;background:var(--border-hi);}
.bracket-node.no-connector::after{display:none;}
.bracket-team-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-mid);}
.bracket-team-row:last-of-type{border-bottom:none;}
.bracket-team-row.is-winner{color:var(--text-hi);font-weight:700;background:rgba(60,172,59,0.05);}
.bracket-team-row.is-eliminated{opacity:0.4;}
.bracket-team-row .flag{width:16px;height:11px;flex-shrink:0;}
.bracket-team-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bracket-pct{font-size:11px;font-weight:700;color:var(--neon);font-variant-numeric:tabular-nums;white-space:nowrap;}
.bracket-pct.fav{color:var(--green);}.bracket-pct.und{color:var(--text-lo);}
.bracket-draw-tag{text-align:center;font-size:9px;font-weight:700;color:var(--neon);padding:2px 0;background:rgba(56,189,248,0.05);border-top:1px solid var(--border);}
.bracket-tbd-node{margin:8px;padding:10px 8px;border:1px dashed rgba(255,255,255,0.1);border-radius:var(--radius-sm);font-size:11px;color:var(--text-lo);text-align:center;font-style:italic;}
.zone-bracket-grid{display:flex;gap:0;min-width:600px;padding:12px 0;}
.zone-round-col{width:190px;flex-shrink:0;display:flex;flex-direction:column;}
.zone-round-header{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);padding:0 8px 10px;border-bottom:1px solid var(--border);margin-bottom:4px;text-align:center;}

/* ── STATUS / SPINNER ── */
.status-pane{padding:60px 20px;text-align:center;color:var(--text-mid);font-size:14px;}
.status-pane.error{color:var(--red);}
.spinner{width:24px;height:24px;border:2px solid rgba(232,160,32,0.2);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(prefers-reduced-motion:reduce){.spinner{animation:none;}}

/* ── FLIP CARD ── */
.flip-card{perspective:1000px;cursor:pointer;}
.flip-card-inner{position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.4,0.2,0.2,1);}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
.flip-face{backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.flip-face-front{position:relative;}
.flip-face-back{position:absolute;inset:0;transform:rotateY(180deg);background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.flip-hint{font-size:10px;font-weight:600;color:var(--text-lo);text-align:center;padding:4px 0 8px;letter-spacing:0.5px;}
.flip-hint span{opacity:0.6;}
.box-score{padding:14px 16px;height:100%;display:flex;flex-direction:column;gap:12px;}
.box-score-header{display:flex;justify-content:space-between;align-items:center;}
.box-score-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
.box-score-close{font-size:10px;font-weight:700;color:var(--text-lo);}
.box-score-teams{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.box-score-team{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text-hi);}
.box-score-team .flag{width:18px;height:12px;}
.box-score-scoreline{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;text-align:center;flex:1;}
.poss-bar-wrap{display:flex;flex-direction:column;gap:4px;}
.poss-label{display:flex;justify-content:space-between;font-size:10px;font-weight:700;}
.poss-label span:first-child{color:var(--green);}.poss-label span:last-child{color:var(--text-mid);}
.poss-label span:nth-child(2){font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-lo);}
.poss-bar{height:5px;border-radius:3px;background:rgba(255,255,255,0.07);overflow:hidden;}
.poss-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--neon));transition:width 0.8s ease;}
.stats-grid{display:flex;flex-direction:column;gap:5px;}
.stat-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;gap:4px;}
.stat-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.stat-val.home{color:var(--text-hi);text-align:left;}.stat-val.away{color:var(--text-mid);text-align:right;}
.stat-label{font-size:9px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-lo);}
.goal-timeline{display:flex;flex-direction:column;gap:4px;}
.goal-timeline-title{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-lo);margin-bottom:2px;}
.goal-timeline-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--neon));transition:width 0.8s ease;}
.goal-event{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;}
.goal-event.home{color:var(--text-hi);}
.goal-event.away{flex-direction:row-reverse;color:var(--text-mid);}
.goal-min{font-size:10px;font-weight:800;color:var(--gold);min-width:30px;text-align:center;background:rgba(232,160,32,0.1);border-radius:3px;padding:1px 4px;}

/* ── SORT / CARD GRID ── */
.sort-row{display:flex;gap:6px;align-items:center;}
.sort-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-lo);min-width:32px;}
.card-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:700px){.card-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){
  .sources-header,.source-row,.supercharger-row{grid-template-columns:1fr 60px 60px 60px;}
  .prob-cell{font-size:12px;}.team-name{font-size:14px;}
}

/* ── PREMIUM COMPLETED CARD ─────────────────────────────────────────── */
.pc-card{background:#06080f;border:1px solid rgba(255,255,255,0.09);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
/* FRONT */
.pc-front{display:flex;flex-direction:column;}
/* Hero header — dark panel with teams + big score */
.pc-hero{background:linear-gradient(135deg,#0d1220 0%,#111827 100%);padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.06);}
.pc-hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pc-tournament{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.pc-matchday{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-lo);}
.pc-teams-score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
.pc-team-left,.pc-team-right{display:flex;flex-direction:column;align-items:center;gap:6px;}
.pc-team-right{align-items:center;}
.pc-flag-lg{width:36px;height:24px;border-radius:3px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.5);flex-shrink:0;}
.pc-flag-lg svg{width:100%;height:100%;display:block;}
.pc-tname{font-size:13px;font-weight:800;color:var(--text-hi);text-align:center;letter-spacing:0.3px;margin-top:2px;}
.pc-tname.winner{color:var(--green);}
.pc-winner-badge{font-size:8px;font-weight:800;letter-spacing:1px;color:var(--green);background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);padding:1px 5px;border-radius:3px;margin-top:2px;}
.pc-score-block{text-align:center;}
.pc-score-num{font-size:44px;font-weight:900;color:#fff;letter-spacing:6px;line-height:1;font-variant-numeric:tabular-nums;}
.pc-score-sep{color:rgba(255,255,255,0.3);font-weight:300;}
.pc-ft-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-lo);margin-top:4px;}
/* Goals timeline below teams */
.pc-goals-row{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);}
.pc-goals-home,.pc-goals-away{display:flex;flex-direction:column;gap:3px;}
.pc-goals-away{align-items:flex-end;}
.pc-goal-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mid);}
.pc-goals-away .pc-goal-item{flex-direction:row-reverse;}
.pc-goal-min-badge{font-size:9px;font-weight:800;color:var(--neon);background:rgba(56,189,248,0.1);border-radius:3px;padding:1px 4px;min-width:26px;text-align:center;}
.pc-goal-scorer{font-size:11px;font-weight:600;color:var(--text-hi);}
/* Stats section */
.pc-stats-section{padding:10px 16px 4px;}
.pc-poss-wrap{margin-bottom:8px;}
.pc-poss-labels{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:3px;}
.pc-poss-home-val{color:var(--neon);}
.pc-poss-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-lo);}
.pc-poss-away-val{color:rgba(248,113,113,0.8);}
.pc-poss-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative;}
.pc-poss-fill-h{position:absolute;left:0;top:0;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--neon),var(--green));}
.pc-poss-fill-a{position:absolute;right:0;top:0;height:100%;border-radius:2px;background:rgba(248,113,113,0.5);}
.pc-stat-table{width:100%;border-collapse:collapse;}
.pc-stat-tr{border-bottom:1px solid rgba(255,255,255,0.03);}
.pc-stat-tr:last-child{border-bottom:none;}
.pc-stat-td-h{font-size:13px;font-weight:700;color:var(--neon);padding:5px 0;text-align:left;width:40px;}
.pc-stat-td-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-lo);text-align:center;}
.pc-stat-td-a{font-size:13px;font-weight:700;color:rgba(248,113,113,0.8);padding:5px 0;text-align:right;width:40px;}
/* Advanced pills */
.pc-adv-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 16px 10px;}
.pc-adv-pill{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:7px 8px;text-align:center;}
.pc-adv-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-lo);display:block;margin-bottom:4px;}
.pc-adv-vals{display:flex;justify-content:space-between;align-items:center;}
.pc-adv-h{font-size:12px;font-weight:800;color:var(--neon);}
.pc-adv-a{font-size:12px;font-weight:700;color:rgba(248,113,113,0.8);}
.pc-adv-dot{font-size:8px;color:var(--text-lo);}
/* Flip hint */
.pc-flip-hint{text-align:center;padding:6px 0 10px;font-size:10px;font-weight:600;color:var(--text-lo);letter-spacing:0.5px;border-top:1px solid rgba(255,255,255,0.04);margin:0 16px;}
/* BACK */
.pc-back{padding:16px;height:100%;display:flex;flex-direction:column;gap:12px;background:#06080f;}
.pc-back-hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06);}
.pc-back-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.pc-back-score{font-size:12px;font-weight:800;color:var(--text-hi);letter-spacing:1px;}
.pc-back-close{font-size:10px;font-weight:700;color:var(--text-lo);}
.pc-insights{display:flex;flex-direction:column;gap:8px;}
.pc-insight-item{padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.02);border-left:2px solid var(--neon);}
.pc-insight-item:nth-child(2){border-left-color:var(--gold);}
.pc-insight-item:nth-child(3){border-left-color:var(--green);}
.pc-insight-ttl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--neon);margin-bottom:4px;}
.pc-insight-item:nth-child(2) .pc-insight-ttl{color:var(--gold);}
.pc-insight-item:nth-child(3) .pc-insight-ttl{color:var(--green);}
.pc-insight-txt{font-size:11px;color:var(--text-mid);line-height:1.55;}
.pc-result-box{margin-top:auto;padding:12px;background:rgba(240,180,41,0.06);border:1px solid rgba(240,180,41,0.2);border-radius:8px;display:flex;align-items:center;gap:10px;}
.pc-result-trophy{font-size:22px;}
.pc-result-text{}
.pc-result-winner{font-size:12px;font-weight:800;text-transform:uppercase;color:var(--gold);letter-spacing:1px;}
.pc-result-summary{font-size:11px;color:var(--text-mid);line-height:1.4;margin-top:2px;}
.pc-pred-accuracy{padding:8px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;}
.pc-pred-title{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-lo);margin-bottom:6px;}
.pc-pred-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:11px;}
.pc-pred-src{color:var(--text-mid);}
.pc-pred-mark{font-size:14px;font-weight:800;}
.pc-pred-correct{color:var(--green);}
.pc-pred-wrong{color:var(--red);}

</style>
</head>
