name: Download Player Headshots

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download headshots from ESPN CDN
        run: |
          mkdir -p assets/headshots

          get_espn() {
            local filename="$1"
            local espn_id="$2"
            local filepath="assets/headshots/${filename}"

            if [ -f "$filepath" ] && [ $(wc -c < "$filepath") -gt 5000 ]; then
              echo "SKIP: $filename"
              return
            fi

            local url="https://a.espncdn.com/i/headshots/soccer/players/full/${espn_id}.png"
            curl -s -L -o "$filepath" "$url"
            local size=$(wc -c < "$filepath")
            if [ "$size" -gt 5000 ]; then
              echo "OK: $filename ($size bytes)"
            else
              rm -f "$filepath"
              echo "FAIL: $filename (ESPN id $espn_id)"
            fi
            sleep 0.2
          }

          get_espn "k-mbappe.jpg"      "231
