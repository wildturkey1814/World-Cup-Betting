name: Deploy Dev Preview

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-dev-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          path: src

      - name: Set up Python for live odds sync
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync sportsbook layers into preview data
        working-directory: src
        continue-on-error: true
        env:
          FORCE_FETCH: '1'
          ODDSPAPI_KEY:  ${{ secrets.ODDSPAPI_KEY }}
          ODDSPAPI_KEY2: ${{ secrets.ODDSPAPI_KEY2 }}
          ODDSPAPI_KEY3: ${{ secrets.ODDSPAPI_KEY3 }}
          ODDSPAPI_KEY4: ${{ secrets.ODDSPAPI_KEY4 }}
          ODDSPAPI_KEY5: ${{ secrets.ODDSPAPI_KEY5 }}
          ODDSPAPI_KEY6: ${{ secrets.ODDSPAPI_KEY6 }}
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          pip install requests cryptography
          python sync_knockout_fixtures.py || true
          python fetch_odds.py || true
          python fetch_kalshi.py || true
          python fetch_polymarket.py || true
          python clean_data.py || true

      - name: Build static preview bundle
        run: |
          mkdir -p bundle
          cp src/index.html src/data.json src/completed_matches.json bundle/
          if [ -d src/assets ]; then cp -r src/assets bundle/; fi
          touch bundle/.nojekyll

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Install preview under dev/
        run: |
          rm -rf main/dev
          mkdir -p main/dev
          cp -r bundle/* main/dev/

      - name: Publish preview to main
        run: |
          cd main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/
          if git diff --staged --quiet; then
            echo "No preview changes to publish."
          else
            git commit -m "deploy: dev preview from ${{ github.sha }} [skip ci]"
            git push
          fi
