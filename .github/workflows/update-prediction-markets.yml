name: Update Prediction Markets

concurrency:
  group: world-cup-data-json
  cancel-in-progress: false

on:
  schedule:
    # Triggers every 15 minutes to stay responsive to trading action
    - cron: '*/15 10-23 * * *'
    - cron: '*/15 0-2 * * *'
  workflow_dispatch:

jobs:
  update-markets:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests cryptography

      - name: Run Kalshi Ingestion
        env:
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python fetch_kalshi.py

      - name: Run Polymarket Ingestion
        run: python fetch_polymarket.py

      - name: Sanitize Dataset
        run: python clean_data.py

      - name: Push Prediction Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No market movement — skipping push."
          else
            git commit -m "chore: push updated trading weights [skip ci]"
            git push
          fi
