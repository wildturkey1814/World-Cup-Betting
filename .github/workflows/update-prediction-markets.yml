name: Update Prediction Markets

on:
  schedule:
    # Every 30 minutes during tournament hours (10:00–02:00 UTC covers all kickoffs)
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-2 * * *'
  workflow_dispatch:
    inputs:
      force_fetch:
        description: 'Force fetch even outside normal windows'
        required: false
        default: 'false'

jobs:
  update-prediction-markets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run Kalshi fetch
        env:
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python fetch_kalshi.py

      - name: Run Polymarket fetch
        run: python fetch_polymarket.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit."
          else
            git commit -m "chore: update prediction market data [skip ci]"
            git push
          fi
