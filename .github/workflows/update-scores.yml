name: Update Live Scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    concurrency:
      group: update-scores
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Clean SRL matches
        run: python clean_data.py

      - name: Fetch live scores
        env:
          FOOTBALL_DATA_KEY:  ${{ secrets.FOOTBALL_DATA_KEY }}
          ZAFRONIX_API_KEY:   ${{ secrets.ZAFRONIX_API_KEY }}
          ZAFRONIX_API_KEY2:  ${{ secrets.ZAFRONIX_API_KEY2 }}
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_KEY2:  ${{ secrets.API_FOOTBALL_KEY2 }}
        run: python fetch_scores.py

      - name: Inject API keys into index.html
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_KEY2: ${{ secrets.API_FOOTBALL_KEY2 }}
        run: python inject_keys.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "scores: live update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
