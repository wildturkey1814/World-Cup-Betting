name: Update Live Scores

on:
  schedule:
    # Triggers every 5 minutes during tournament hours to keep match timelines live
    - cron: '*/5 10-23 * * *'
    - cron: '*/5 0-2 * * *'
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Real-Time Scores and Stats
        run: python fetch_scores.py

      - name: Push Live Match Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No score updates — skipping push."
          else
            git commit -m "live: update real-time match events [skip ci]"
            git push
          fi
