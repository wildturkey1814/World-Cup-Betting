name: Update Live Scoring Polling 

concurrency:
  group: world-cup-data-json
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-scores:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Real-Time Scores and Stats
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python fetch_scores.py

      - name: Reconcile layers vs ESPN public scoreboard
        run: python reconcile_match_layers.py

      - name: Enrich Completed Match Stats
        run: python sync_completed_archive.py

      - name: Sanitize Dataset
        run: python clean_data.py

      - name: Push Live Match Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json completed_matches.json
          if git diff --staged --quiet; then
            echo "No score or archive changes found."
          else
            git commit -m "data: live score & stats flash updates [skip ci]"
            git push
          fi
