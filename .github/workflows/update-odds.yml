name: Master World Cup Data Sync

on:
  schedule:
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-2 * * *'
  workflow_dispatch:
    inputs:
      pull_expensive_odds:
        description: 'Set to 1 to force a live premium OddsPapi API call'
        required: false
        default: '0'

jobs:
  sync-all-layers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Network Dependencies
        run: pip install requests cryptography

      - name: Process Sportsbook Base Odds
        continue-on-error: true
        env:
          FORCE_FETCH: ${{ github.event.inputs.pull_expensive_odds }}
          ODDSPAPI_KEY:  ${{ secrets.ODDSPAPI_KEY }}
          ODDSPAPI_KEY2: ${{ secrets.ODDSPAPI_KEY2 }}
          ODDSPAPI_KEY3: ${{ secrets.ODDSPAPI_KEY3 }}
          ODDSPAPI_KEY4: ${{ secrets.ODDSPAPI_KEY4 }}
          ODDSPAPI_KEY5: ${{ secrets.ODDSPAPI_KEY5 }}
          ODDSPAPI_KEY6: ${{ secrets.ODDSPAPI_KEY6 }}
        run: python fetch_odds.py

      - name: Process Live Scores
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_KEY }}
          ZAFRONIX_API_KEY:  ${{ secrets.ZAFRONIX_API_KEY }}
          ZAFRONIX_API_KEY2: ${{ secrets.ZAFRONIX_API_KEY2 }}
        run: python fetch_scores.py

      - name: Process Kalshi Orderbooks
        env:
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python fetch_kalshi.py

      - name: Process Polymarket Outrights
        run: python fetch_polymarket.py

      - name: Commit Unified Dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data adjustments found. Skipping push."
          else
            git commit -m "chore: automated master data sync update [skip ci]"
            git push
          fi
