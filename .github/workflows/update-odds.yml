name: Master World Cup Data Sync

on:
  schedule:
    # Triggers every 30 minutes to update Scores and Prediction Markets frequently
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-2 * * *'
  workflow_dispatch:
    inputs:
      pull_expensive_odds:
        description: 'Set to 1 to force a live premium OddsPapi API call'
        required: false
        default: '0'

jobs:
  sync-all-layers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Network Dependencies
        run: pip install requests cryptography

      # ── LAYER 1: BASE SPORTSBOOK ODDS ──
      # Uses your input flag or internal logic to skip premium calls unless necessary
      - name: Process Sportsbook Base Odds
        env:
          FORCE_FETCH: ${{ github.event.inputs.pull_expensive_odds }}
        run: python fetch_odds.py

      # ── LAYER 2: REAL-TIME SCORES & RECOS ──
      # Moves cards dynamically to completed states & handles Box Score flips
      - name: Process Live Scores
        run: python fetch_scores.py

      # ── LAYER 3: PREDICTION MARKETS ──
      # Appends P2P market weights below consensus layers
      - name: Process Kalshi Orderbooks
        env:
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python fetch_kalshi.py

      - name: Process Polymarket Outrights
        run: python fetch_polymarket.py

      # ── ATOMIC WRITE COMMIT ──
      - name: Commit Unified Dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data adjustments found. Skipping push."
          else
            git commit -m "chore: automated master data sync update [skip ci]"
            git push
          fi
