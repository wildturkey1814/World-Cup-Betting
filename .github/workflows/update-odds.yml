name: Update World Cup Odds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    concurrency:
      group: update-odds
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live odds and update data.json
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          FORCE_FETCH: "1"
        run: python fetch_odds.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: auto-update odds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
